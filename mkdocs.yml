site_name: HomeScale Docs
site_url: https://xxx
repo_url: https://github.com/HomeScaleCloud/homescale
repo_name: HomeScaleCloud/homescale
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Networking: architecture/networking.md
      - Secrets: architecture/secrets.md  # pragma: allowlist secret
  - Operations:
      - Deploying an App: operations/deploying-an-app.md
      - App Reference: operations/apps.md
      - Clusters: operations/clusters.md
      - Backups: operations/backups.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
