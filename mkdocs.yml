site_name: HomeScale Docs
site_url: https://homescalecloud.github.io/homescale/
repo_url: https://github.com/HomeScaleCloud/homescale
repo_name: HomeScaleCloud/homescale
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Networking: architecture/networking.md
      - Secrets: architecture/secrets.md  # pragma: allowlist secret
  - Operations:
      - Clusters: operations/clusters.md
      - Backups: operations/backups.md
      - Apps: operations/apps.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - tables
