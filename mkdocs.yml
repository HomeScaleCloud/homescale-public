site_name: HomeScale Docs
site_url: https://REDACTED
repo_url: https://github.com/HomeScaleCloud/homescale
repo_name: HomeScaleCloud/homescale
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/homescale-icon.png
  favicon: assets/homescale-icon.png
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Teams: architecture/teams.md
      - Networking: architecture/networking.md
      - Secrets: architecture/secrets.md  # pragma: allowlist secret
      - Clusters: architecture/clusters.md
      - Apps: architecture/apps.md
      - Backups: architecture/backups.md
  - Operations:
      - Deploying an App: operations/deploying-an-app.md
      - Registering Machines: operations/registering-machines.md
      - hsctl: operations/hsctl.md
  - Runbooks:
      - Overview: runbooks/index.md
      - Omni:
          - OmniDown: runbooks/omni-down.md
          - OmniNoConnectedMachines: runbooks/omni-no-connected-machines.md
          - OmniNoMachines: runbooks/omni-no-machines.md
          - OmniSecureBootDisabled: runbooks/omni-secure-boot-disabled.md
      - PDU:
          - ApcPduOffline: runbooks/apc-pdu-offline.md
          - ApcPduVoltageWarning: runbooks/apc-pdu-voltage-warning.md
          - ApcPduVoltageCritical: runbooks/apc-pdu-voltage-critical.md
          - ApcPduBankLoadHigh: runbooks/apc-pdu-bank-load-high.md
          - ApcPduBankNearOverload: runbooks/apc-pdu-bank-near-overload.md
      - VolSync:
          - VolSyncMissedBackupInterval: runbooks/volsync-missed-backup-interval.md
          - VolSyncMoverJobFailed: runbooks/volsync-mover-job-failed.md
          - VolSyncControllerDown: runbooks/volsync-controller-down.md
      - NetBird:
          - NetBirdOperatorDown: runbooks/netbird-operator-down.md
          - NetBirdClusterProxyNotReady: runbooks/netbird-clusterproxy-not-ready.md
          - NetBirdNetworkRouterNotReady: runbooks/netbird-networkrouter-not-ready.md
          - NetBirdNetworkResourceNotReady: runbooks/netbird-networkresource-not-ready.md
          - NetBirdReconcileErrors: runbooks/netbird-reconcile-errors.md
          - NetBirdWorkqueueBacklog: runbooks/netbird-workqueue-backlog.md
      - Longhorn:
          - LonghornVolumeFaulted: runbooks/longhorn-volume-faulted.md
          - LonghornVolumeDegraded: runbooks/longhorn-volume-degraded.md
          - LonghornVolumeSpaceFilling: runbooks/longhorn-volume-space-filling.md
          - LonghornDiskFailed: runbooks/longhorn-disk-failed.md
          - LonghornDiskNotReady: runbooks/longhorn-disk-not-ready.md
          - LonghornDiskStorageWarning: runbooks/longhorn-disk-storage-warning.md
          - LonghornDiskStorageCritical: runbooks/longhorn-disk-storage-critical.md
          - LonghornNodeDown: runbooks/longhorn-node-down.md
          - LonghornNodeNotReady: runbooks/longhorn-node-not-ready.md
          - LonghornNodeStorageWarning: runbooks/longhorn-node-storage-warning.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
