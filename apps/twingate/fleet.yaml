defaultNamespace: twingate
name: twingate
helm:
  releaseName: twingate
  chart: ./
  values:
    global:
      cluster: "${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
    twingate-operator:
      twingateOperator:
        existingAPIKeySecret:
          name: op-tg-k8s-operator
          key: credential
        network: "homescale"
        remoteNetworkName: "${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
      kubernetes-access-gateway:
        enabled: true
        ssh:
          enabled: true
          gateway:
            username: "hs"
            key:
              type: "ed25519"
            hostCertificate:
              ttl: "24h"
            userCertificate:
              ttl: "5m"
          upstreams:
            - name: "Test"
              address: "10.1.240.5:22"
        twingate:
          network: "homescale"
          resource:
            enabled: true
            extraAnnotations:
              resource.twingate.com/name: "k8s-${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
              resource.twingate.com/alias: "k8s.${ .ClusterName }.${ get .ClusterLabels \"xxx/env\" }.${ get .ClusterLabels \"xxx/region\" }.xxx"
              resource.twingate.com/securityPolicyId: "U2VjdXJpdHlQb2xpY3k6MTA3MDUwOA=="

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        global:
          cluster: "mgmt"
        twingate-operator:
          twingateOperator:
            existingAPIKeySecret:
              name: tf-tg-k8s-operator
            remoteNetworkName: "mgmt"
          kubernetes-access-gateway:
            twingate:
              resource:
                extraAnnotations:
                  resource.twingate.com/name: "k8s-mgmt"
                  resource.twingate.com/alias: "xxx"
