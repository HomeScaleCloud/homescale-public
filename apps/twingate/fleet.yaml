defaultNamespace: twingate
name: twingate
helm:
  releaseName: twingate
  chart: ./
  values:
    global:
      cluster: "${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
    twingate-operator:
      twingateOperator:
        existingAPIKeySecret:
          name: op-tg-k8s-operator
          key: credential
        network: "homescale"
        remoteNetworkName: "${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
      kubernetes-access-gateway:
        enabled: true
        gateway:
          fullname: "k8s-${ .ClusterName }-${ get .ClusterLabels \"xxx/env\" }-${ get .ClusterLabels \"xxx/region\" }"
        twingate:
          network: "homescale"
          resource:
            enabled: true
            extraAnnotations:
              resource.twingate.com/alias: "k8s.${ .ClusterName }.${ get .ClusterLabels \"xxx/env\" }.${ get .ClusterLabels \"xxx/region\" }.xxx"

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        global:
          cluster: "mgmt"
        twingate-operator:
          twingateOperator:
            existingAPIKeySecret:
              name: tf-tg-k8s-operator
            remoteNetworkName: "mgmt"
          kubernetes-access-gateway:
            gateway:
              fullname: "k8s-mgmt"
            twingate:
              resource:
                extraAnnotations:
                  resource.twingate.com/alias: "xxx"
