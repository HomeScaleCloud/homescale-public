defaultNamespace: twingate
name: twingate
helm:
  releaseName: twingate
  chart: ./
  values:
    global:
      cluster: "${ .ClusterName }-${ get .ClusterLabels \"REDACTED/env\" }-${ get .ClusterLabels \"REDACTED/region\" }"
    twingate-operator:
      twingateOperator:
        existingAPIKeySecret:
          name: op-tg-k8s-operator
          key: credential
        network: "homescale"
        remoteNetworkName: "${ .ClusterName }-${ get .ClusterLabels \"REDACTED/env\" }-${ get .ClusterLabels \"REDACTED/region\" }"
      kubernetes-access-gateway:
        enabled: true
        twingate:
          network: "homescale"
          resource:
            enabled: true
            extraAnnotations:
              resource.twingate.com/name: "k8s-${ .ClusterName }-${ get .ClusterLabels \"REDACTED/env\" }-${ get .ClusterLabels \"REDACTED/region\" }"
              resource.twingate.com/alias: "k8s.${ .ClusterName }.${ get .ClusterLabels \"REDACTED/env\" }.${ get .ClusterLabels \"REDACTED/region\" }.REDACTED"
              resource.twingate.com/securityPolicyId: "U2VjdXJpdHlQb2xpY3k6MTA3MDUwOA=="
targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
    helm:
      values:
        global:
          cluster: "mgmt"
        twingate-operator:
          twingateOperator:
            existingAPIKeySecret:
              name: tf-tg-k8s-operator
            remoteNetworkName: "mgmt"
          kubernetes-access-gateway:
            twingate:
              resource:
                extraAnnotations:
                  resource.twingate.com/name: "k8s-mgmt"
                  resource.twingate.com/alias: "REDACTED"
