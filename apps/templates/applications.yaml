{{- $root := . -}}
{{- $clusterName := required "cluster.name is required" $root.Values.cluster.name -}}
{{- $namespaces := dict -}}
{{- $systemNamespaces := list "argocd" "kube-system" "kube-public" "kube-node-lease" "default" -}}
{{- range $path, $_ := $root.Files.Glob "*/app.yaml" }}
{{- $appName := $path | dir }}
{{- $appBase := $root.Files.Get $path | fromYaml }}
{{- $clusterOverride := default (dict) (get (default (dict) $root.Values.apps) $appName) }}
{{- $enabled := false }}
{{- if hasKey $appBase "defaultDeploy" }}{{- $enabled = $appBase.defaultDeploy }}{{- end }}
{{- if hasKey $clusterOverride "deploy" }}{{- $enabled = $clusterOverride.deploy }}{{- end }}
{{- if $enabled }}
{{- $app := mergeOverwrite (deepCopy $appBase) (omit $clusterOverride "deploy") }}
{{- $appPath := required (printf "path is required (set in apps/%s/app.yaml)" $appName) $app.path -}}
{{- $appNamespace := required (printf "namespace is required (set in apps/%s/app.yaml)" $appName) $app.namespace -}}
{{- $repoURL := required (printf "repoURL or apps.%s.repoURL is required" $appName) (default $root.Values.repoURL $app.repoURL) -}}
{{- $targetRevision := default $root.Values.targetRevision $app.targetRevision -}}
{{- $project := default $root.Values.project $app.project -}}
{{- $destination := default (dict) $app.destination -}}
{{- $destinationServer := default $root.Values.destination.server $destination.server -}}
{{- $destinationName := default (default $clusterName $root.Values.destination.name) $destination.name -}}
{{- $releaseName := default $appName $app.releaseName -}}
{{- $valuesObject := default (dict) $app.values -}}
{{- $syncPolicy := mergeOverwrite (deepCopy (default (dict) $root.Values.syncPolicy)) (default (dict) $app.syncPolicy) -}}
{{- $syncOptions := concat (default (list) $root.Values.syncOptions) (default (list) $app.syncOptions) | uniq -}}
{{- if and (not (hasKey $namespaces $appNamespace)) (not (has $appNamespace $systemNamespaces)) }}
{{- $_ := set $namespaces $appNamespace true }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $appNamespace | quote }}
  labels:
    app.kubernetes.io/part-of: homescale
    xxx/name: {{ $clusterName | quote }}
{{- if $app.podSecurity }}
    pod-security.kubernetes.io/enforce: {{ $app.podSecurity | quote }}
    pod-security.kubernetes.io/warn: {{ $app.podSecurity | quote }}
    pod-security.kubernetes.io/audit: {{ $app.podSecurity | quote }}
{{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "-35"
{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ include "homescale-catalog.applicationName" (dict "root" $root "appName" $appName) | quote }}
  namespace: {{ default "argocd" $root.Values.argocd.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ $appName | quote }}
    app.kubernetes.io/part-of: homescale
    xxx/name: {{ $appName | quote }}
    xxx/name: {{ $clusterName | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ default 0 $app.syncWave | quote }}
{{- with $app.annotations }}
{{ tpl (toYaml .) $root | nindent 4 }}
{{- end }}
spec:
  project: {{ $project | quote }}
{{- if $app.extraSources }}
  sources:
    - repoURL: {{ $repoURL | quote }}
      targetRevision: {{ $targetRevision | quote }}
      path: {{ $appPath | quote }}
      helm:
        releaseName: {{ $releaseName | quote }}
{{- with $app.valueFiles }}
        valueFiles:
{{ toYaml . | nindent 10 }}
{{- end }}
        valuesObject:{{ tpl (toYaml $valuesObject) $root | nindent 10 }}
{{- range $app.extraSources }}
    - {{- toYaml . | nindent 6 }}
{{- end }}
{{- else }}
  source:
    repoURL: {{ $repoURL | quote }}
    targetRevision: {{ $targetRevision | quote }}
    path: {{ $appPath | quote }}
    helm:
      releaseName: {{ $releaseName | quote }}
{{- with $app.valueFiles }}
      valueFiles:
{{ toYaml . | nindent 8 }}
{{- end }}
      valuesObject:{{ tpl (toYaml $valuesObject) $root | nindent 8 }}
{{- end }}
  destination:
{{- if $destinationServer }}
    server: {{ $destinationServer | quote }}
{{- else }}
    name: {{ $destinationName | quote }}
{{- end }}
    namespace: {{ $appNamespace | quote }}
{{- with $app.ignoreDifferences }}
  ignoreDifferences:{{ tpl (toYaml .) $root | nindent 4 }}
{{- end }}
{{- if or $syncPolicy $syncOptions }}
{{- if $syncPolicy }}
  syncPolicy:{{ toYaml $syncPolicy | nindent 4 }}
{{- else }}
  syncPolicy:
{{- end }}
{{- if $syncOptions }}
    syncOptions:
{{- range $syncOptions }}
      - {{ . | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- with $root.Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
{{ end }}
{{ end }}
{{ end }}
