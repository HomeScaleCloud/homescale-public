defaultNamespace: tailscale
name: tailscale
helm:
  releaseName: tailscale
  chart: ./
  values:
    tailscale-operator:
      proxyConfig:
        defaultTags: "tag:app,tag:env-${ get .ClusterLabels \"cluster.homescale.cloud/env\" }"
      operatorConfig:
        hostname: "ts-${ .ClusterName }-${ get .ClusterLabels \"cluster.homescale.cloud/env\" }-${ get .ClusterLabels \"cluster.homescale.cloud/region\" }"
        defaultTags:
          - "tag:k8s"
          - "tag:env-${ get .ClusterLabels \"cluster.homescale.cloud/env\" }"
      apiServerProxyConfig:
        allowImpersonation: "true"
targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        cluster.homescale.cloud/env: mgmt
    helm:
      values:
        tailscale-operator:
          operatorConfig:
            hostname: "ts-mgmt"

overrideTargets:
  - clusterSelector:
      matchLabels:
        app.homescale.cloud/gah: enabled
