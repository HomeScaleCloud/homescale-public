defaultNamespace: tailscale
name: tailscale
helm:
  releaseName: tailscale
  chart: ./
  values:
    tailscale-operator:
      proxyConfig:
        defaultTags: "tag:app,tag:env-${ get .ClusterLabels \"REDACTED/env\" }"
      operatorConfig:
        hostname: "ts-${ .ClusterName }-${ get .ClusterLabels \"REDACTED/env\" }-${ get .ClusterLabels \"REDACTED/region\" }"
        defaultTags:
          - "tag:k8s"
          - "tag:env-${ get .ClusterLabels \"REDACTED/env\" }"
      apiServerProxyConfig:
        allowImpersonation: "true"
overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/tailscale: enabled
targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
    helm:
      values:
        tailscale-operator:
          operatorConfig:
            hostname: "ts-mgmt"
