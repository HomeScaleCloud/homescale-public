defaultNamespace: tailscale
name: tailscale-crs
helm:
  releaseName: tailscale-crs
  chart: ./
  values:
    global:
      cluster: ${ .ClusterName }-${ get .ClusterLabels "REDACTED/region" }
      env: ${ get .ClusterLabels "REDACTED/env" }
    kubeProxy:
      replicas: 1
    ingressProxy:
      replicas: 2

# dependsOn:
#   - name: tailscale
#     acceptedStates:
#       - Ready

targetCustomizations:
  - name: prod
    clusterSelector:
      matchLabels:
        REDACTED/env: prod
    helm:
      values:
        kubeProxy:
          replicas: 2
        ingressProxy:
          replicas: 3
  - name: mgmt
    clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
    helm:
      values:
        global:
          cluster: mgmt
        kubeProxy:
          replicas: 2
        ingressProxy:
          replicas: 3
