apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn-rules
  namespace: longhorn-system
  labels:
    release: metrics
spec:
  groups:
    - name: longhorn.rules
      rules:
        # Volume health
        - alert: LonghornVolumeFaulted
          annotations:
            summary: "Longhorn volume is faulted."
            description: "Volume {{ "{{" }}$labels.volume{{ "}}" }} (PVC {{ "{{" }}$labels.pvc_namespace{{ "}}" }}/{{ "{{" }}$labels.pvc{{ "}}" }}) is faulted on node {{ "{{" }}$labels.node{{ "}}" }}."
            runbook_url: "https://REDACTED/runbooks/longhorn-volume-faulted/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_volume_robustness{state="faulted"} == 1
          for: 2m
          labels:
            severity: critical

        - alert: LonghornVolumeDegraded
          annotations:
            summary: "Longhorn volume is degraded."
            description: "Volume {{ "{{" }}$labels.volume{{ "}}" }} (PVC {{ "{{" }}$labels.pvc_namespace{{ "}}" }}/{{ "{{" }}$labels.pvc{{ "}}" }}) is degraded on node {{ "{{" }}$labels.node{{ "}}" }}. A replica may be rebuilding or unavailable."
            runbook_url: "https://REDACTED/runbooks/longhorn-volume-degraded/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_volume_robustness{state="degraded"} == 1
          for: 5m
          labels:
            severity: warning

        - alert: LonghornVolumeSpaceFilling
          annotations:
            summary: "Longhorn volume is over 90% full."
            description: "Volume {{ "{{" }}$labels.volume{{ "}}" }} (PVC {{ "{{" }}$labels.pvc_namespace{{ "}}" }}/{{ "{{" }}$labels.pvc{{ "}}" }}) actual usage is at {{ "{{" }}$value | humanizePercentage{{ "}}" }} of capacity."
            runbook_url: "https://REDACTED/runbooks/longhorn-volume-space-filling/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_volume_actual_size_bytes / longhorn_volume_capacity_bytes > 0.9
          for: 5m
          labels:
            severity: warning

        # Disk health
        - alert: LonghornDiskFailed
          annotations:
            summary: "Longhorn disk health check failed."
            description: "Disk {{ "{{" }}$labels.disk{{ "}}" }} on node {{ "{{" }}$labels.node{{ "}}" }} has failed its health check."
            runbook_url: "https://REDACTED/runbooks/longhorn-disk-failed/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_disk_health == 0
          for: 2m
          labels:
            severity: critical

        - alert: LonghornDiskNotReady
          annotations:
            summary: "Longhorn disk is not ready."
            description: "Disk {{ "{{" }}$labels.disk{{ "}}" }} on node {{ "{{" }}$labels.node{{ "}}" }} is not ready."
            runbook_url: "https://REDACTED/runbooks/longhorn-disk-not-ready/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_disk_status{condition="ready"} == 0
          for: 5m
          labels:
            severity: critical

        - alert: LonghornDiskStorageWarning
          annotations:
            summary: "Longhorn disk storage over 70% used."
            description: "Disk {{ "{{" }}$labels.disk{{ "}}" }} on node {{ "{{" }}$labels.node{{ "}}" }} is at {{ "{{" }}$value | humanizePercentage{{ "}}" }} capacity."
            runbook_url: "https://REDACTED/runbooks/longhorn-disk-storage-warning/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes > 0.7
          for: 5m
          labels:
            severity: warning

        - alert: LonghornDiskStorageCritical
          annotations:
            summary: "Longhorn disk storage over 90% used."
            description: "Disk {{ "{{" }}$labels.disk{{ "}}" }} on node {{ "{{" }}$labels.node{{ "}}" }} is at {{ "{{" }}$value | humanizePercentage{{ "}}" }} capacity."
            runbook_url: "https://REDACTED/runbooks/longhorn-disk-storage-critical/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_disk_usage_bytes / longhorn_disk_capacity_bytes > 0.9
          for: 5m
          labels:
            severity: critical

        # Node health
        - alert: LonghornNodeDown
          annotations:
            summary: "Longhorn node is offline."
            description: "{{ "{{" }}$value{{ "}}" }} Longhorn node(s) have been offline for more than 5 minutes."
            runbook_url: "https://REDACTED/runbooks/longhorn-node-down/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: (avg(longhorn_node_count_total) or on() vector(0)) - (count(longhorn_node_status{condition="ready"} == 1) or on() vector(0)) > 0
          for: 5m
          labels:
            severity: critical

        - alert: LonghornNodeNotReady
          annotations:
            summary: "Longhorn node is not ready."
            description: "Longhorn node {{ "{{" }}$labels.node{{ "}}" }} is not ready."
            runbook_url: "https://REDACTED/runbooks/longhorn-node-not-ready/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_node_status{condition="ready"} == 0
          for: 5m
          labels:
            severity: critical

        - alert: LonghornNodeStorageWarning
          annotations:
            summary: "Longhorn node storage over 70% used."
            description: "Node {{ "{{" }}$labels.node{{ "}}" }} storage is at {{ "{{" }}$value | humanizePercentage{{ "}}" }} capacity."
            runbook_url: "https://REDACTED/runbooks/longhorn-node-storage-warning/"
            dashboard_url: "https://REDACTED/d/ozk-lh-mon"
          expr: longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes > 0.7
          for: 5m
          labels:
            severity: warning
