clusters:
  mgmt:
    deploy: true
    # values:
    #   volsync:
    #     restore:
    #       enabled: true

path: apps/omni
namespace: omni
releaseName: omni
syncWave: 0
values:
  certIssuer: letsencrypt-staging
  cluster:
    name: "{{ .Values.cluster.name }}"
  omni:
    etcdEncryptionKey:
      existingSecret: omni # pragma: allowlist secret

    additionalConfigSources:
      - existingSecret: omni  # pragma: allowlist secret
        key: config.yaml

    config:
      account:
        id: 7848e298-4d35-4c33-a4c8-6659160b6afb
        name: HomeScale
      auth:
        auth0:
          enabled: false
        saml:
          enabled: true
        initialServiceAccount:
          enabled: true
          name: bootstrap
          keyPath: /data/initial-sa-key
          role: Admin
          lifetime: 24h0m0s
      services:
        api:
          advertisedURL: "https://REDACTED"
          certFile: /tls/tls.crt
          keyFile: /tls/tls.key
        kubernetesProxy:
          advertisedURL: "https://REDACTED"
          certFile: /tls/tls.crt
          keyFile: /tls/tls.key
        machineAPI:
          advertisedURL: "https://REDACTED"
          certFile: /tls/tls.crt
          keyFile: /tls/tls.key
        siderolink:
          wireGuard:
            advertisedEndpoint: "REDACTED:50180"

    service:
      wireguard:
        type: ClusterIP

    ingress:
      main:
        enabled: false
      kubernetesProxy:
        enabled: false
      siderolinkApi:
        enabled: false

    extraVolumes:
      - name: omni-tls
        secret:
          secretName: omni-tls

    extraVolumeMounts:
      - name: omni-tls
        mountPath: /tls
        readOnly: true

    extraContainers:
      - name: toolbox
        image: alpine:latest
        command: ["sleep", "infinity"]
        volumeMounts:
          - name: data
            mountPath: /data

    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /healthz
        port: omni
        scheme: HTTPS
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 3

    persistence:
      enabled: true
      size: 16Gi
      existingClaim: omni
