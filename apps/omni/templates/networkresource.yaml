apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: api
  namespace: omni
spec:
  networkRouterRef:
    name: '{{ required "cluster.name is required" .Values.cluster.name }}'
    namespace: netbird
  serviceRef:
    name: api
  groups:
    - name: app-omni
    - name: cluster-{{ required "cluster.name is required" .Values.cluster.name }}
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: k8s
  namespace: omni
spec:
  networkRouterRef:
    name: '{{ required "cluster.name is required" .Values.cluster.name }}'
    namespace: netbird
  serviceRef:
    name: k8s
  groups:
    - name: app-omni
    - name: cluster-{{ required "cluster.name is required" .Values.cluster.name }}
