{{- $ns := .Release.Namespace }}
{{- $peers := list }}
{{- range $i := until 3 }}
{{- $peers = append $peers (printf "etcd-%d=https://etcd-%d.etcd-headless.%s.svc.cluster.local:2380" $i $i $ns) }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: {{ $ns }}
spec:
  serviceName: etcd-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etcd
    spec:
      containers:
        - name: etcd
          image: gcr.io/etcd-development/etcd:v3.6.4
          command: ["/usr/local/bin/etcd"]
          args:
            - --name=$(POD_NAME)
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=https://0.0.0.0:2379
            - --advertise-client-urls=https://$(POD_NAME).etcd-headless.{{ $ns }}.svc.cluster.local:2379
            - --listen-peer-urls=https://0.0.0.0:2380
            - --initial-advertise-peer-urls=https://$(POD_NAME).etcd-headless.{{ $ns }}.svc.cluster.local:2380
            - --initial-cluster={{ join "," $peers }}
            - --initial-cluster-state=new
            - --initial-cluster-token=omni-etcd
            - --cert-file=/certs/tls.crt
            - --key-file=/certs/tls.key
            - --trusted-ca-file=/certs/ca.crt
            - --client-cert-auth=true
            - --peer-cert-file=/certs/tls.crt
            - --peer-key-file=/certs/tls.key
            - --peer-trusted-ca-file=/certs/ca.crt
            - --peer-client-cert-auth=true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCDCTL_API
              value: "3"
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          livenessProbe:
            exec:
              command:
                - etcdctl
                - --endpoints=https://127.0.0.1:2379
                - --cacert=/certs/ca.crt
                - --cert=/certs/tls.crt
                - --key=/certs/tls.key
                - endpoint
                - health
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - etcdctl
                - --endpoints=https://127.0.0.1:2379
                - --cacert=/certs/ca.crt
                - --cert=/certs/tls.crt
                - --key=/certs/tls.key
                - endpoint
                - health
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: etcd-tls # pragma: allowlist secret
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: {{ $ns }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 2379
      name: client
    - port: 2380
      name: peer
  selector:
    app.kubernetes.io/name: etcd
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: {{ $ns }}
spec:
  type: ClusterIP
  ports:
    - port: 2379
      name: client
  selector:
    app.kubernetes.io/name: etcd
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: etcd
  namespace: {{ $ns }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
