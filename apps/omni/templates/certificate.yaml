apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: omni-tls
  namespace: omni
spec:
  secretName: omni-tls
  issuerRef:
    name: {{ .Values.certIssuer | default "letsencrypt" }}
    kind: ClusterIssuer
{{- $homescale := default (dict) .Values.homescale }}
{{- $clusterName := required "cluster.name is required" .Values.cluster.name }}
{{- /* siderolink/machineAPI plus the old per-cluster names, kept for backwards compatibility */}}
{{- $staticNames := list
      (required "siderolinkHostname is required" .Values.siderolinkHostname)
      (required "machineApiHostname is required" .Values.machineApiHostname)
      (printf "omni.%REDACTED" $clusterName)
      (printf "k8s.omni.%REDACTED" $clusterName)
}}
{{- $dnsNames := concat (default (list) $homescale.exposePublicFqdns) (default (list) $homescale.netbirdCnameFqdns) $staticNames | uniq }}
  dnsNames:
{{- range $dnsNames }}
    - {{ . }}
{{- end }}
