apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: omni
  namespace: omni
spec:
  sourcePVC: omni
  trigger:
    schedule: "0 */2 * * *"
  restic:
    repository: omni-volsync-repo # pragma: allowlist secret
    copyMethod: Snapshot
    retain:
      daily: 7
      weekly: 4
      monthly: 3
    pruneIntervalDays: 7
{{- if ((.Values.volsync).restore).enabled }}
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: omni-restore
  namespace: omni
spec:
  trigger:
    manual: restore-once
  restic:
    repository: omni-volsync-repo # pragma: allowlist secret
    copyMethod: Direct
    destinationPVC: omni
{{- end }}
