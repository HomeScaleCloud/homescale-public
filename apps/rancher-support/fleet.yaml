defaultNamespace: cattle-system
name: rancher-support
helm:
  releaseName: rancher-support
  chart: ./
  values:
    cluster:
      name: "${ .ClusterName }"
      region: "${ get .ClusterLabels \"REDACTED/region\" }"

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
    helm:
      values:
        cluster:
          name: mgmt

dependsOn:
  - name: netbird-crs
    acceptedStates:
      - Ready

overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/rancher: enabled
