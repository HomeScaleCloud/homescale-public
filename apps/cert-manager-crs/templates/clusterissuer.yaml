apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: ssl@REDACTED
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-tls
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare
              key: credential
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: omni-etcd-ca
spec:
  ca:
    secretName: omni-etcd-ca # pragma: allowlist secret
