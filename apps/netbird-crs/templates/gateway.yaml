apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: netbird-private
  namespace: netbird
spec:
  gatewayClassName: netbird-private
  listeners:
    - protocol: gateway.netbird.io/NetworkRouter
      name: '{{- if eq .Values.cluster.name "mgmt" -}}{{ .Values.cluster.name }}{{- else -}}{{ required "cluster.name is required" .Values.cluster.name }}-{{ required "cluster.region is required unless cluster.name is mgmt" .Values.cluster.region }}{{- end }}'
      port: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: netbird-public
  namespace: netbird
spec:
  gatewayClassName: netbird-public
  listeners:
    - protocol: gateway.netbird.io/NetworkRouter
      name: '{{- if eq .Values.cluster.name "mgmt" -}}{{ .Values.cluster.name }}{{- else -}}{{ required "cluster.name is required" .Values.cluster.name }}-{{ required "cluster.region is required unless cluster.name is mgmt" .Values.cluster.region }}{{- end }}'
      port: 1
