apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: networking-admin
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
      - ingressclasses
    verbs: ["*"]
  - apiGroups: ["netbird.io"]
    resources:
      - networkresources
      - networkrouters
    verbs: ["*"]
