apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: networking-viewer
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["netbird.io"]
    resources:
      - "*"
    verbs: ["get", "list", "watch"]
