defaultDeploy: false

clusters:
  boa1-prod:
    deploy: false

path: apps/home-assistant
namespace: home-assistant
releaseName: home-assistant
syncWave: 0
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  network:
    master: bond0.241
    ip: "10.1.241.5/24"
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: "2026.3.2"
  pvc:
    size: 25Gi
  mqtt:
    image:
      repository: eclipse-mosquitto
      tag: "2.0.21"
    pvc:
      config:
        size: 100Mi
      data:
        size: 5Gi
  zigbee2mqtt:
    image:
      repository: ghcr.io/koenkk/zigbee2mqtt
      tag: "2.9.2"
    pvc:
      size: 10Gi
    config:
      tz: "Europe/London"
      mqttServer: "mqtt://localhost:1883"
      mqttBaseTopic: "z2m"
      serialPort: "tcp://10.1.241.238:6638"
      serialAdapter: "ember"
      channel: "25"
      frontendEnabled: "true"
      homeassistantEnabled: "true"
  matter:
    image:
      repository: ghcr.io/matter-js/python-matter-server
      tag: "stable"
    pvc:
      size: 1Gi
  homebridge:
    image:
      repository: homebridge/homebridge
      tag: "latest"
    pvc:
      size: 10Gi
  volsync:
    backupSchedule: "0 2 * * *"
