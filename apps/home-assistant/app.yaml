path: apps/home-assistant
namespace: home-assistant
releaseName: home-assistant
syncWave: 0
podSecurity: privileged
defaultDeploy: false
netbird:
  policy:
    rules:
      - sources: ["owners"]
        protocol: tcp
        ports: ["80", "443"]
clusters:
  boa1-prod:
    deploy: true
    values:
      replicaCount: 0
      zigbee2mqtt:
        replicaCount: 0
        config:
          serialPort: "tcp://10.1.241.238:6638"
      homebridge:
        replicaCount: 0
      volsync:
        restore:
          enabled: true
          moverSecurityContext:
            mqtt-config:
              runAsUser: 100
              runAsGroup: 101
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  network:
    ip: "10.1.241.5/24"
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: "2026.3.2"
  replicaCount: 1
  pvc:
    size: 25Gi
  mqtt:
    image:
      repository: eclipse-mosquitto
      tag: "2.0.21"
    pvc:
      config:
        size: 100Mi
      data:
        size: 5Gi
  zigbee2mqtt:
    replicaCount: 1
    image:
      repository: ghcr.io/koenkk/zigbee2mqtt
      tag: "2.9.2"
    pvc:
      size: 10Gi
    config:
      tz: "Europe/London"
      mqttServer: "mqtt://localhost:1883"
      mqttBaseTopic: "z2m"
      serialAdapter: "ember"
      baudrate: "115200"
      rtscts: "false"
      channel: "25"
      cacheState: "true"
      logLevel: "info"
      lastSeen: "ISO_8601_local"
      adapterConcurrent: "38"
      frontendEnabled: "true"
      frontendPort: "8080"
      frontendPackage: "zigbee2mqtt-windfront"
      homeassistantEnabled: "true"
      availabilityEnabled: "true"
  matter:
    image:
      repository: ghcr.io/matter-js/python-matter-server
      tag: "stable"
    pvc:
      size: 1Gi
  homebridge:
    replicaCount: 1
    image:
      repository: homebridge/homebridge
      tag: "latest"
    pvc:
      size: 10Gi
  volsync:
    backupSchedule: "0 2 * * *"
