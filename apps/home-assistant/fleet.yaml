defaultNamespace: home-assistant
name: home-assistant
helm:
  releaseName: home-assistant
  chart: ./
  values:
    image:
      repository: ghcr.io/home-assistant/home-assistant
      tag: "2025.12.5"
    ingress:
      enabled: true
      className: "tailscale"
      host: "ha-${ .ClusterName }-${ get .ClusterLabels \"xxx/region\" }.xxx"
      annotations:
        "tailscale.com/hostname": "ha-${ .ClusterName }-${ get .ClusterLabels \"xxx/region\" }"
        "tailscale.com/tags": "tag:app-ha,tag:env-${ get .ClusterLabels \"xxx/env\" }"
    pvc:
      size: 25Gi
    zigbee:
      local: true
      devicePath: "/dev/ttyUSB0"

dependsOn:
  - name: tailscale
    acceptedStates:
      - Ready

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/home-assistant: enabled
