apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-wifi
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": {{ .Values.network.master | quote }},
      "mode": "bridge",
      "ipam": {
        "type": "static"
      }
    }
