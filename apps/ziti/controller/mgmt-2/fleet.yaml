defaultNamespace: ziti
name: ziti-controller-mgmt-2
helm:
  releaseName: ziti-controller-mgmt-2
  chart: ./
  values:
    ziti-controller:
      cluster:
        mode: cluster-join
        trustDomain: xxx
        nodeName: controller-mgmt-2
        endpoint: xxx:443

      clientApi:
        advertisedHost: xxx
        advertisedPort: 32176
        service:
          type: NodePort
          annotations:
            external-dns.alpha.kubernetes.io/hostname: xxx
            external-dns.alpha.kubernetes.io/ttl: "60"

      edgeSignerPki:
        alternativeIssuer:
          name: ziti-controller-mgmt-1-edge-root-issuer
          kind: Issuer
          group: cert-manager.io

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt

dependsOn:
  - name: ziti-controller-mgmt-1
    acceptedStates:
      - Ready
