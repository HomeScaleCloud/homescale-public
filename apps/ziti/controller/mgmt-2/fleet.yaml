defaultNamespace: ziti
name: ziti-controller-mgmt-2
helm:
  releaseName: ziti-controller-mgmt-2
  chart: ./
  values:
    ziti-controller:
      image:
        tag: 1.8.0-pre5
      cluster:
        mode: cluster-join
        trustDomain: xxx
        nodeName: controller-mgmt-2
        endpoint: xxx:443

      clientApi:
        advertisedHost: xxx
        advertisedPort: 443
        traefikTcpRoute:
          enabled: true
          labels:
            xxx/class: public
        service:
          type: ClusterIP

      edgeSignerPki:
        alternativeIssuer:
          name: ziti-controller-mgmt-1-edge-root-issuer
          kind: Issuer
          group: cert-manager.io

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt

dependsOn:
  - name: ziti-controller-mgmt-1
    acceptedStates:
      - Ready
