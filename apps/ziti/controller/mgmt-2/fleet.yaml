defaultNamespace: ziti
name: ziti-controller-mgmt-2
helm:
  releaseName: ziti-controller-mgmt-2
  chart: ./
  values:
    ziti-controller:
      cluster:
        mode: cluster-join
        trustDomain: REDACTED
        nodeName: controller-mgmt-2
        endpoint: REDACTED:443

      clientApi:
        advertisedHost: REDACTED
        advertisedPort: 32176
        service:
          type: NodePort
          annotations:
            external-dns.alpha.kubernetes.io/hostname: REDACTED
            external-dns.alpha.kubernetes.io/ttl: "60"

      webBindingPki:
        enabled: true
        altServerCerts:
          - mode: certManager
            secretName: tls-ziti-controller-mgmt-2
            altDnsNames:
              - "REDACTED"
            issuerRef:
              group: cert-manager.io
              kind: ClusterIssuer
              name: letsencrypt
            mountPath: /etc/ziti/alt-server-cert

      edgeSignerPki:
        alternativeIssuer:
          name: ziti-controller-mgmt-1-edge-root-issuer
          kind: Issuer
          group: cert-manager.io

overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/env: mgmt

dependsOn:
  - name: ziti-controller-mgmt-1
    acceptedStates:
      - Ready
