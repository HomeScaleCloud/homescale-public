defaultNamespace: ziti
name: ziti-controller-mgmt-2
helm:
  releaseName: ziti-controller-mgmt-2
  chart: ./
  values:
    ziti-controller:
      image:
        tag: 2.0.0-pre12
      cluster:
        mode: cluster-join
        trustDomain: REDACTED
        nodeName: controller-mgmt-2
        endpoint: REDACTED:443

      clientApi:
        advertisedHost: REDACTED
        advertisedPort: 443
        traefikTcpRoute:
          enabled: true
          labels:
            REDACTED/class: public
        service:
          type: ClusterIP

      edgeSignerPki:
        alternativeIssuer:
          name: ziti-controller-mgmt-1-edge-root-issuer
          kind: Issuer
          group: cert-manager.io

overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/env: mgmt

dependsOn:
  - name: ziti-controller-mgmt-1
    acceptedStates:
      - Ready
