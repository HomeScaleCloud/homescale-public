defaultNamespace: ziti
name: ziti-controller-mgmt-2
helm:
  releaseName: ziti-controller-mgmt-2
  chart: ./
  values:
    ziti-controller:
      cluster:
        mode: cluster-join
        trustDomain: xxx
        nodeName: controller-mgmt-2
        endpoint: xxx:443

      clientApi:
        advertisedHost: xxx
        advertisedPort: 443
        ingress:
          enabled: true
          ingressClassName: traefik-public
          annotations:
            kubernetes.io/ingress.allow-http: "false"
            nginx.ingress.kubernetes.io/ssl-passthrough: "true"
        service:
          type: ClusterIP

      edgeSignerPki:
        alternativeIssuer:
          name: ziti-controller-mgmt-1-edge-root-issuer
          kind: Issuer
          group: cert-manager.io

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt

dependsOn:
  - name: ziti-controller-mgmt-1
    acceptedStates:
      - Ready
