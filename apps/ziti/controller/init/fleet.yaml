defaultNamespace: ziti
name: ziti-controller-init
helm:
  releaseName: ziti-controller-init
  chart: ./
  values:
    ziti-controller:
      cluster:
        mode: cluster-init
        trustDomain: xxx
        nodeName: controller-init
      clientApi:
        advertisedHost: xxx
        advertisedPort: 443
        service:
          type: LoadBalancer
          annotations:
            external-dns.alpha.kubernetes.io/hostname: xxx

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt
