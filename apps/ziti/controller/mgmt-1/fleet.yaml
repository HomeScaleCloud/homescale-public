defaultNamespace: ziti
name: ziti-controller-mgmt-1
helm:
  releaseName: ziti-controller-mgmt-1
  chart: ./
  values:
    ziti-controller:
      cluster:
        mode: cluster-init
        trustDomain: xxx
        nodeName: controller-mgmt-1
      clientApi:
        advertisedHost: xxx
        advertisedPort: 443
        service:
          type: LoadBalancer
          annotations:
            external-dns.alpha.kubernetes.io/hostname: xxx
      webBindingPki:
        enabled: true
        altServerCerts:
          - mode: certManager
            secretName: tls-ziti-controller-mgmt-1
            altDnsNames:
              - "xxx"
            issuerRef:
              group: cert-manager.io
              kind: ClusterIssuer
              name: letsencrypt
            mountPath: /etc/ziti/alt-server-cert

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt

dependsOn:
  - name: trust-manager
    acceptedStates:
      - Ready
