defaultDeploy: true

clusters:
  mgmt:
    deploy: false

path: apps/cilium
namespace: kube-system
releaseName: cilium
syncWave: -40
syncOptions:
  - ServerSideApply=true
values:
  cilium:
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445
    ipam:
      mode: kubernetes
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
