defaultDeploy: true

clusters:
  mgmt:
    deploy: false

path: apps/cilium
namespace: kube-system
releaseName: cilium
syncWave: -40
syncOptions:
  - ServerSideApply=true
values:
  cilium:
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445
    ipam:
      mode: kubernetes
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
