apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/manifests

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: rancher-helm
    patch: |-
      - op: replace
        path: /spec/sources/0/helm/valuesObject/hostname
        value: xxx
  - target:
      group: cert-manager.io
      version: v1
      kind: Certificate
      name: tls-rancher-ingress
    patch: |-
      - op: add
        path: /spec/commonName
        value: xxx
      - op: add
        path: /spec/dnsNames
        value:
          - xxx
