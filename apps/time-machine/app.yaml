path: apps/time-machine
namespace: time-machine
releaseName: time-machine
syncWave: 0
podSecurity: privileged
defaultDeploy: false
netbird:
  policy:
    rules:
      - sources: ["owners"]
        protocol: tcp
        ports: ["445"]
clusters:
  boa1-prod:
    deploy: true
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  network:
    ip: "10.1.241.7/24"
  image:
    repository: ghcr.io/homescalecloud/time-machine
    tag: latest
  timemachine:
    volumeName: Time Machine
    uid: "1000"
    gid: "1000"
  pvc:
    size: 400Gi
  volsync:
    backupSchedule: "0 3 * * *"
