apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: "cloudflare/cloudflared:{{ .Values.image.tag }}"
          args:
            - tunnel
            - --no-autoupdate
            - --credentials-file
            - /etc/cloudflared/credentials.json
            - run
            - "homescale-{{ .Values.cluster.name }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: credentials
              mountPath: /etc/cloudflared
              readOnly: true
      volumes:
        - name: credentials
          secret:
            secretName: cloudflared
            items:
              - key: TUNNEL_CREDENTIALS
                path: credentials.json
