defaultDeploy: false

path: apps/rook-ceph-cluster-boa1
namespace: rook-ceph-boa1
releaseName: boa1
podSecurity: privileged
syncWave: 0

clusters:
  prod:
    deploy: true
    values:
      rook-ceph-cluster:
        operatorNamespace: rook-ceph
        clusterName: boa1
        cephClusterSpec:
          network:
            provider: host
          storage:
            useAllNodes: true
            useAllDevices: true
            config:
              minSize: "900G"
          placement:
            all:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: REDACTED/region
                          operator: In
                          values:
                            - boa1
