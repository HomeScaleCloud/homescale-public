traefik:
  deployment:
    replicas: 2
  service:
    type: LoadBalancer
  ingressClass:
    enabled: true
    name: traefik-public
    isDefaultClass: false
  providers:
    kubernetesIngress:
      enabled: true
      ingressClass: traefik-public
      publishedService:
        enabled: true
    kubernetesCRD:
      enabled: true
      ingressClass: traefik-public
  additionalArguments:
    - "--providers.kubernetesingress.ingressclass=traefik-public"
