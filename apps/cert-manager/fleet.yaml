defaultNamespace: cert-manager
name: cert-manager
helm:
  releaseName: cert-manager
  chart: ./
  values:
    cert-manager:
      crds:
        enabled: true

overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/env: metal
    doNotDeploy: true

diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: cert-manager-webhook
      jsonPointers:
        - /webhooks

    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: cert-manager-webhook
      jsonPointers:
        - /webhooks
