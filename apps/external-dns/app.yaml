path: apps/external-dns
namespace: external-dns
releaseName: external-dns
syncWave: -10
defaultDeploy: false
clusters:
  mgmt:
    deploy: true
values:
  external-dns:
    sources:
      - service
      - ingress
    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare
            key: credential
    domainFilters: ["xxx"]
    extraArgs:
      - --resolve-service-load-balancer-hostname
