defaultNamespace: external-dns
name: external-dns
helm:
  releaseName: external-dns
  chart: ./
  values:
    external-dns:
      sources:
        - service
        - ingress
        - traefik-proxy
      provider:
        name: cloudflare
      env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: op-cloudflare
              key: credential
      domainFilters: ["xxx"]

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/external-dns: enabled
