    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 1.125rem;
      line-height: 1.75rem;
      background: #fafafa;
      color: #171717;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;

      footer p { color: #a3a3a3; }

    main {

      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;

    img.avatar {

      height: 144px;
      border-radius: 9999px;

      margin-bottom: 0.5rem;
    }
    h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.25rem; }
    h2 { font-size: 1.25rem; font-weight: 400; color: #737373; margin-bottom: 1.5rem; }
    @media (prefers-color-scheme: dark) { h2 { color: #a3a3a3; } }

    .links { width: 100%; display: flex; flex-direction: column; gap: 0.75rem; }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.6rem 1rem;
      border-radius: 0.375rem;
      text-decoration: none;
      font-size: 1.125rem;
      font-weight: 500;
      color: #fff;
      background: #7e22ce;
      transition: filter 0.15s;
    }
    .link:hover { filter: brightness(0.9); }
    .link svg { width: 1.1em; height: 1.1em; flex-shrink: 0; }

    .link-linkedin  { background: #0077b5; }
    .link-email     { background: rgb(228, 20, 9); }
    .link-github    { background: #333; }
    .link-telegram  { background: #25a3e1; }
    .link-steam     { background: #000; }

    footer {
      margin-top: 2.5rem;
      text-align: center;
    }
    footer p { font-size: 0.875rem; color: #737373; }
  </style>
