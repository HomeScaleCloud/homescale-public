defaultNamespace: netbird
name: netbird-server
helm:
  releaseName: netbird-server
  chart: ./
  values:
    netbird:
      fullnameOverride: netbird

      management:
        podCommand:
          args:
            - --port=80
            - --log-file=console
            - --log-level=info
            - --disable-anonymous-metrics=true
            - --single-account-mode-domain=xxx
            - --dns-domain=xxx
        configmap: |-
          {
            "Relay": {
              "Addresses": ["rels://xxx:443/relay"],
              "CredentialsTTL": "24h",
              "Secret": "{{ .RELAY_PASSWORD }}"
            },
            "Signal": {
              "Proto": "https",
              "URI": "xxx:443",
              "Username": "",
              "Password": ""
            },
            "Datadir": "/var/lib/netbird/",
            "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
            "HttpConfig": {
              "LetsEncryptDomain": "",
              "CertFile": "",
              "CertKey": "",
              "AuthAudience": "{{ .IDP_CLIENT_ID }}",
              "AuthIssuer": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/v2.0",
              "AuthUserIDClaim": "oid",
              "AuthKeysLocation": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/discovery/v2.0/keys",
              "OIDCConfigEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/v2.0/.well-known/openid-configuration",
              "IdpSignKeyRefreshEnabled": true
            },
            "IdpManagerConfig": {
              "ManagerType": "azure",
              "ClientConfig": {
                "Issuer": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/v2.0",
                "TokenEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/oauth2/v2.0/token",
                "ClientID": "{{ .IDP_CLIENT_ID }}",
                "ClientSecret": "{{ .IDP_CLIENT_SECRET }}",
                "GrantType": "client_credentials"
              },
              "ExtraConfig": {
                "ObjectId": "{{ .IDP_OBJECT_ID }}",
                "GraphApiEndpoint": "https://graph.microsoft.com/v1.0"
              },
              "Auth0ClientCredentials": null,
              "AzureClientCredentials": null,
              "KeycloakClientCredentials": null,
              "ZitadelClientCredentials": null
            },
            "DeviceAuthorizationFlow": {
              "Provider": "none",
              "ProviderConfig": {
                "ClientID": "{{ .IDP_CLIENT_ID }}",
                "ClientSecret": "",
                "Domain": "",
                "Audience": "{{ .IDP_CLIENT_ID }}",
                "TokenEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/oauth2/v2.0/token",
                "DeviceAuthEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/oauth2/v2.0/devicecode",
                "AuthorizationEndpoint": "",
                "Scope": "openid",
                "UseIDToken": false,
                "RedirectURLs": null
              }
            },
            "PKCEAuthorizationFlow": {
              "ProviderConfig": {
                "ClientID": "{{ .IDP_CLIENT_ID }}",
                "ClientSecret": "",
                "Domain": "",
                "Audience": "{{ .IDP_CLIENT_ID }}",
                "TokenEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/oauth2/v2.0/token",
                "DeviceAuthEndpoint": "",
                "AuthorizationEndpoint": "https://login.microsoftonline.com/{{ .IDP_TENANT_ID }}/oauth2/v2.0/authorize",
                "Scope": "openid profile email offline_access User.Read api://{{ .IDP_CLIENT_ID }}/api",
                "UseIDToken": true,
                "RedirectURLs": ["http://localhost:53000"]
              }
            },
            "StoreConfig": {
              "Engine": "sqlite"
            },
            "ReverseProxy": {
              "TrustedHTTPProxies": null,
              "TrustedHTTPProxiesCount": 0,
              "TrustedPeers": null
            }
          }
        persistentVolume:
          enabled: true
        envFromSecret:
          # NETBIRD_STORE_ENGINE_POSTGRES_DSN: op-netbird/postgresDSN
          RELAY_PASSWORD: op-netbird/relayPassword #pragma: allowlist secret
          IDP_TENANT_ID: op-netbird/idpTenantID
          IDP_CLIENT_ID: op-netbird/idpClientID
          IDP_CLIENT_SECRET: op-netbird/idpClientSecret #pragma: allowlist secret
          IDP_OBJECT_ID: op-netbird/idpObjectID
          DATASTORE_ENCRYPTION_KEY: op-netbird/datastoreEncryptionKey

      relay:
        env:
          NB_LOG_LEVEL: info
          NB_LISTEN_ADDRESS: ":33080"
          NB_EXPOSED_ADDRESS: rels://xxx:443/relay
        envFromSecret:
          NB_AUTH_SECRET: op-netbird/relayPassword #pragma: allowlist secret

      dashboard:
        enabled: true
        env:
          NETBIRD_MGMT_API_ENDPOINT: https://xxx:443
          NETBIRD_MGMT_GRPC_API_ENDPOINT: https://xxx:443
          AUTH_CLIENT_SECRET: ""
          USE_AUTH0: false
          AUTH_REDIRECT_URI: /auth
          AUTH_SILENT_REDIRECT_URI: /silent-auth
          NETBIRD_TOKEN_SOURCE: idToken
          NGINX_SSL_PORT: ""
          LETSENCRYPT_DOMAIN: ""
          LETSENCRYPT_EMAIL: ""
        envFromSecret:
          AUTH_CLIENT_ID: op-netbird/idpClientID
          AUTH_AUDIENCE: op-netbird/idpClientID
          # AUTH_AUTHORITY: op-netbird/authAuthority
          # AUTH_SUPPORTED_SCOPES: op-netbird/authSupportedScopes

      extraManifests:
        - apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: netbird-tls
          spec:
            secretName: netbird-tls
            dnsNames:
              - xxx
            issuerRef:
              name: letsencrypt
              kind: ClusterIssuer

        - apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: netbird
            annotations:
              external-dns.alpha.kubernetes.io/hostname: xxx
              kubernetes.io/ingress.class: traefik-public
            labels:
              xxx/class: public
          spec:
            entryPoints:
              - websecure
            routes:
              - kind: Rule
                match: Host(`xxx`) && !PathPrefix(`/api`) && !PathPrefix(`/management`) && !PathPrefix(`/signalexchange`) && !PathPrefix(`/relay`)
                services:
                  - name: netbird-dashboard
                    namespace: netbird
                    passHostHeader: true
                    port: 80
              - kind: Rule
                match: Host(`xxx`) && PathPrefix(`/api`)
                services:
                  - name: netbird-management
                    namespace: netbird
                    passHostHeader: true
                    port: 80
              - kind: Rule
                match: Host(`xxx`) && PathPrefix(`/relay`)
                services:
                  - name: netbird-relay
                    namespace: netbird
                    passHostHeader: true
                    port: 33080
              - kind: Rule
                match: Host(`xxx`) && PathPrefix(`/management`)
                services:
                  - name: netbird-management
                    namespace: netbird
                    passHostHeader: true
                    port: 80
                    scheme: h2c
              - kind: Rule
                match: Host(`xxx`) && PathPrefix(`/signalexchange`)
                services:
                  - name: netbird-signal
                    namespace: netbird
                    passHostHeader: true
                    port: 80
                    scheme: h2c
            tls:
              secretName: netbird-tls


dependsOn:
  - name: onepassword
    acceptedStates:
      - Ready
  - name: cert-manager
    acceptedStates:
      - Ready
  - name: traefik-public
    acceptedStates:
      - Ready
  - name: external-dns
    acceptedStates:
      - Ready

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/env: mgmt
