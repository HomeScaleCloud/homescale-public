defaultNamespace: netbird
name: netbird
helm:
  releaseName: netbird
  chart: ./
  values:
    kubernetes-operator:
      operator:
        replicaCount: 2
      cluster:
        name: "${ .ClusterName }-${ get .ClusterLabels \"xxx/region\" }"
      netbirdAPI:
        keyFromSecret:
          name: op-netbird
          key: password
      gatewayAPI:
        enabled: true

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        kubernetes-operator:
          cluster:
            name: mgmt

dependsOn:
  - name: cert-manager
    acceptedStates:
      - Ready
  - name: onepassword
    acceptedStates:
      - Ready

diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: netbird-kubernetes-operator-mpod-webhook
      operations:
        - op: remove
          path: /webhooks
