defaultNamespace: netbird
name: netbird
helm:
  releaseName: netbird
  chart: ./
  values:
    kubernetes-operator:
      cluster:
        name: "${ .ClusterName }-${ get .ClusterLabels \"xxx/region\" }"
      netbirdAPI:
        keyFromSecret:
          name: op-netbird
          key: password

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        kubernetes-operator:
          cluster:
            name: mgmt

dependsOn:
  - name: cert-manager
    acceptedStates:
      - Ready
  - name: onepassword
    acceptedStates:
      - Ready
