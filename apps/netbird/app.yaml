defaultDeploy: true

path: apps/netbird
namespace: netbird
releaseName: netbird
podSecurity: privileged
syncWave: -20
syncOptions:
  - ServerSideApply=true
ignoreDifferences:
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    name: netbird-kubernetes-operator-mpod-webhook
    jsonPointers:
      - /webhooks
values:
  netbird-operator:
    cluster:
      name: '{{ .Values.cluster.name }}'
    operator:
      replicaCount: 2
    webhook:
      failurePolicy: Ignore
    netbirdAPI:
      keyFromSecret:
        name: netbird
        key: NETBIRD_OPERATOR_TOKEN
