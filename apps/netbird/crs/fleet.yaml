defaultNamespace: netbird
name: netbird-crs
helm:
  releaseName: netbird-crs
  chart: ./
  values:
    cluster:
      name: "${ .ClusterName }"
      region: "${ get .ClusterLabels \"xxx/region\" }"
      env: "${ get .ClusterLabels \"xxx/env\" }"

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        cluster:
          name: mgmt

dependsOn:
  - name: netbird
    acceptedStates:
      - Ready
