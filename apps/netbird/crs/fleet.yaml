defaultNamespace: netbird
name: netbird-crs
helm:
  releaseName: netbird-crs
  chart: ./
  values:
    cluster:
      name: "${ .ClusterName }"
      region: "${ get .ClusterLabels \"REDACTED/region\" }"

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
    helm:
      values:
        cluster:
          name: mgmt

dependsOn:
  - name: netbird
    acceptedStates:
      - Ready
