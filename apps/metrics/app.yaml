path: apps/metrics
namespace: metrics
releaseName: metrics
syncWave: 0
podSecurity: privileged
syncOptions:
  - ServerSideApply=true
defaultDeploy: true
clusters:
  boa1-prod:
    deploy: true
    values:
      kube-prometheus-stack:
        grafana:
          enabled: true
          service:
            port: 443
            targetPort: 3000
          serviceMonitor:
            enabled: true
            scheme: https
            tlsConfig:
              insecureSkipVerify: true
          grafana.ini:
            server:
              protocol: https
              http_port: 3000
              cert_file: /etc/grafana/tls/tls.crt
              cert_key: /etc/grafana/tls/tls.key
              domain: REDACTED
              root_url: https://REDACTED
            auth:
              disable_login_form: true
              oauth_auto_login: true
              signout_redirect_url: "https://login.microsoftonline.com/common/oauth2/v2.0/logout"
            auth.azuread:
              enabled: true
              name: Microsoft
              allow_sign_up: true
              scopes: "openid email profile"
          envFromSecret: grafana-oauth  # pragma: allowlist secret
          extraSecretMounts:
            - name: tls
              secretName: metrics-tls  # pragma: allowlist secret
              mountPath: /etc/grafana/tls
              readOnly: true
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: ""
          deploymentStrategy:
            type: Recreate
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          sidecar:
            dashboards:
              enabled: false
            datasources:
              enabled: false
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  allowUiUpdates: false
                  updateIntervalSeconds: 30
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboardsConfigMaps:
            default: grafana-dashboards
          extraVolumes:
            - name: dashboard-node-exporter
              configMap:
                name: grafana-dashboards-node-exporter
          extraVolumeMounts:
            - name: dashboard-node-exporter
              mountPath: /etc/grafana/dashboards/default/node-exporter-full.json
              subPath: node-exporter-full.json
              readOnly: true
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://prometheus.metrics.svc.cluster.local:9090
                  isDefault: true
                  uid: prometheus
                  jsonData:
                    httpMethod: POST
                    timeInterval: 30s
                - name: Loki
                  type: loki
                  url: http://loki.metrics.svc.cluster.local:3100
                  uid: loki
                  jsonData:
                    maxLines: 1000
          defaultDashboardsEnabled: false
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: [alertname, cluster, namespace]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                - matchers:
                    - alertname="Watchdog"
                  receiver: "null"
            receivers:
              - name: "null"
          alertmanagerSpec:
            alertmanagerConfigSelector: {}
            alertmanagerConfigMatcherStrategy:
              type: None
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 2Gi
        prometheus:
          prometheusSpec:
            remoteWrite:
              - name: prometheus-aggregator
                url: "http://prometheus.metrics.svc.cluster.local:9090/api/v1/write"
  boa1-gw:
    deploy: true
    values:
      snmpExporter:
        enabled: true
      kube-prometheus-stack:
        prometheus:
          prometheusSpec:
            additionalScrapeConfigs:
              - job_name: pdu_01_boa1
                scrape_interval: 60s
                scrape_timeout: 30s
                static_configs:
                  - targets: ['10.1.246.5']
                    labels:
                      location: boa1
                      device: ap7920-pdu
                metrics_path: /snmp
                params:
                  module: [apc_rpdu]
                  auth: [snmpv1_public]
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: __param_target
                  - source_labels: [__param_target]
                    target_label: instance
                  - target_label: __address__
                    replacement: snmp-exporter.metrics.svc.cluster.local:9116
              - job_name: pdu_02_boa1
                scrape_interval: 60s
                scrape_timeout: 30s
                static_configs:
                  - targets: ['10.1.246.6']
                    labels:
                      location: boa1
                      device: ap7920-pdu
                metrics_path: /snmp
                params:
                  module: [apc_rpdu]
                  auth: [snmpv1_public]
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: __param_target
                  - source_labels: [__param_target]
                    target_label: instance
                  - target_label: __address__
                    replacement: snmp-exporter.metrics.svc.cluster.local:9116
netbird:
  policy:
    rules:
      - sources: ["team-infra-plat", "team-sec-plat", "app:metrics"]
        protocol: tcp
        ports: ["80", "443", "9090", "3100"]
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  snmpExporter:
    enabled: false
    image:
      repository: prom/snmp-exporter
      tag: "v0.26.0"
    community: "public"
  kube-prometheus-stack:
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 2h
        externalLabels:
          cluster: "{{ .Values.cluster.name }}"
        ruleSelectorNilUsesHelmValues: false
        ruleSelector:
          matchLabels:
            prometheus: "none"
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        remoteWrite:
          - name: prometheus-aggregator
            url: "http://REDACTED:9090/api/v1/write"
            remoteTimeout: 2m
            queueConfig:
              maxSamplesPerSend: 500
        volumes:
          - name: netbird-run
            emptyDir: {}
          - name: netbird-lib
            emptyDir: {}
        initContainers:
          - name: nb-client
            image: "ghcr.io/netbirdio/netbird:0.71.4"
            restartPolicy: Always
            startupProbe:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "netbird status 2>/dev/null | grep -qi connected"
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 60
            env:
              - name: NB_SETUP_KEY
                valueFrom:
                  secretKeyRef:
                    name: setup-key-metrics  # pragma: allowlist secret
                    key: setup-key  # pragma: allowlist secret
              - name: NB_MANAGEMENT_URL
                value: https://api.netbird.io
              - name: NB_LOG_LEVEL
                value: info
              - name: NB_LOG_FILE
                value: console
              - name: NB_DISABLE_PROFILES
                value: "true"
              - name: NB_DISABLE_UPDATE_SETTINGS
                value: "true"
              - name: NB_DAEMON_ADDR
                value: unix:///var/run/netbird/netbird.sock
              - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
                value: "0"
            securityContext:
              privileged: true
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                add:
                  - NET_ADMIN
                  - SYS_RESOURCE
                  - SYS_ADMIN
            volumeMounts:
              - name: netbird-run
                mountPath: /var/run/netbird
              - name: netbird-lib
                mountPath: /var/lib/netbird
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
  metrics-server:
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
  alloy:
    alloy:
      configMap:
        content: |-
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "__host__"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.write.loki.receiver]
          }

          loki.source.kubernetes_events "events" {
            job_name   = "integrations/kubernetes/eventhandler"
            log_format = "logfmt"
            forward_to = [loki.write.loki.receiver]
          }

          loki.write "loki" {
            endpoint {
              url = "http://REDACTED:3100/loki/api/v1/push"
            }
            external_labels = {
              cluster = "{{ .Values.cluster.name }}",
            }
          }
    controller:
      volumes:
        extra:
          - name: netbird-run
            emptyDir: {}
          - name: netbird-lib
            emptyDir: {}
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      initContainers:
        - name: nb-client
          image: "ghcr.io/netbirdio/netbird:0.71.4"
          restartPolicy: Always
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "netbird status 2>/dev/null | grep -qi connected"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: setup-key-metrics  # pragma: allowlist secret
                  key: setup-key  # pragma: allowlist secret
            - name: NB_MANAGEMENT_URL
              value: https://api.netbird.io
            - name: NB_LOG_LEVEL
              value: info
            - name: NB_LOG_FILE
              value: console
            - name: NB_DISABLE_PROFILES
              value: "true"
            - name: NB_DISABLE_UPDATE_SETTINGS
              value: "true"
            - name: NB_DAEMON_ADDR
              value: unix:///var/run/netbird/netbird.sock
            - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
              value: "0"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - SYS_RESOURCE
                - SYS_ADMIN
          volumeMounts:
            - name: netbird-run
              mountPath: /var/run/netbird
            - name: netbird-lib
              mountPath: /var/lib/netbird
