path: apps/metrics
namespace: metrics
releaseName: metrics
syncWave: 0
podSecurity: privileged
syncOptions:
  - ServerSideApply=true
defaultDeploy: true
clusters:
  boa1-prod:
    deploy: true
    values:
      kube-prometheus-stack:
        grafana:
          enabled: true
          service:
            port: 443
            targetPort: 3000
          grafana.ini:
            server:
              protocol: https
              http_port: 3000
              cert_file: /etc/grafana/tls/tls.crt
              cert_key: /etc/grafana/tls/tls.key
              domain: REDACTED
              root_url: https://REDACTED
            auth:
              disable_login_form: true
              oauth_auto_login: true
              signout_redirect_url: "https://login.microsoftonline.com/common/oauth2/v2.0/logout"
            auth.azuread:
              enabled: true
              name: Microsoft
              allow_sign_up: true
              scopes: "openid email profile"
          envFromSecret: grafana-oauth  # pragma: allowlist secret
          extraSecretMounts:
            - name: tls
              secretName: metrics-tls  # pragma: allowlist secret
              mountPath: /etc/grafana/tls
              readOnly: true
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: ""
          deploymentStrategy:
            type: Recreate
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          sidecar:
            skipTlsVerify: true
            dashboards:
              reloadURL: "https://localhost:3000/api/admin/provisioning/dashboards/reload"
            datasources:
              reloadURL: "https://localhost:3000/api/admin/provisioning/datasources/reload"
          defaultDashboardsEnabled: false
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: grafana-dashboards
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: true
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/grafana-dashboards
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: [alertname, cluster, namespace]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                - matchers:
                    - alertname="Watchdog"
                  receiver: "null"
            receivers:
              - name: "null"
          alertmanagerSpec:
            alertmanagerConfigSelector: {}
            alertmanagerConfigMatcherStrategy:
              type: None
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 2Gi
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true
            remoteWrite: []
            initContainers: []
            volumes: []
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 50Gi
netbird:
  policy:
    rules:
      - sources: ["team-infra-plat", "team-sec-plat", "app:metrics"]
        protocol: tcp
        ports: ["80", "443", "9090"]
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  kube-prometheus-stack:
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 2h
        externalLabels:
          cluster: "{{ .Values.cluster.name }}"
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        remoteWrite:
          - url: "http://REDACTED/api/v1/write"
        volumes:
          - name: netbird-run
            emptyDir: {}
          - name: netbird-lib
            emptyDir: {}
        initContainers:
          - name: netbird
            image: "ghcr.io/netbirdio/netbird:0.71.4"
            restartPolicy: Always
            startupProbe:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "netbird status 2>/dev/null | grep -qi connected"
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 60
            env:
              - name: NB_SETUP_KEY
                valueFrom:
                  secretKeyRef:
                    name: setup-key-metrics  # pragma: allowlist secret
                    key: setup-key  # pragma: allowlist secret
              - name: NB_MANAGEMENT_URL
                value: https://api.netbird.io
              - name: NB_LOG_LEVEL
                value: info
              - name: NB_LOG_FILE
                value: console
              - name: NB_DISABLE_PROFILES
                value: "true"
              - name: NB_DISABLE_UPDATE_SETTINGS
                value: "true"
              - name: NB_DAEMON_ADDR
                value: unix:///var/run/netbird/netbird.sock
              - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
                value: "0"
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
                  - SYS_RESOURCE
                  - SYS_ADMIN
            volumeMounts:
              - name: netbird-run
                mountPath: /var/run/netbird
              - name: netbird-lib
                mountPath: /var/lib/netbird
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
