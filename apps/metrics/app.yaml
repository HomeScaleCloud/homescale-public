defaultDeploy: false

clusters:
  boa1-prod:
    deploy: true
    values:
      kube-prometheus-stack:
        grafana:
          enabled: true
          service:
            port: 443
            targetPort: 3000
          grafana.ini:
            server:
              protocol: https
              http_port: 3000
              cert_file: /etc/grafana/tls/tls.crt
              cert_key: /etc/grafana/tls/tls.key
              domain: REDACTED
              root_url: https://REDACTED
            auth:
              disable_login_form: true
              oauth_auto_login: true
              signout_redirect_url: "https://login.microsoftonline.com/common/oauth2/v2.0/logout"
            auth.azuread:
              enabled: true
              name: Microsoft
              allow_sign_up: true
              scopes: "openid email profile"
          envFromSecret: grafana-oauth  # pragma: allowlist secret
          extraSecretMounts:
            - name: tls
              secretName: metrics-tls  # pragma: allowlist secret
              mountPath: /etc/grafana/tls
              readOnly: true
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi
          adminPassword: ""
          deploymentStrategy:
            type: Recreate
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
          sidecar:
            skipTlsVerify: true
            dashboards:
              reloadURL: "https://localhost:3000/api/admin/provisioning/dashboards/reload"
            datasources:
              reloadURL: "https://localhost:3000/api/admin/provisioning/datasources/reload"
          defaultDashboardsEnabled: false
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: grafana-dashboards
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: true
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/grafana-dashboards
          dashboards:
            grafana-dashboards:
              k8s-system-api-server:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json"
                token: ""
              k8s-addons-prometheus:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-addons-prometheus.json"
                token: ""
              k8s-system-coredns:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json"
                token: ""
              k8s-views-global:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json"
                token: ""
              k8s-views-namespaces:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json"
                token: ""
              k8s-views-nodes:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json"
                token: ""
              k8s-views-pods:
                url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json"
                token: ""
              k8s-events-exporter:
                url: "https://grafana.com/api/dashboards/17882/revisions/2/download"
                token: ""
              node-exporter-full:
                url: "https://grafana.com/api/dashboards/1860/revisions/41/download"
                token: ""
              argocd-overview:
                url: "https://grafana.com/api/dashboards/14584/revisions/1/download"
                token: ""
              longhorn:
                url: "https://grafana.com/api/dashboards/22705/revisions/1/download"
                token: ""
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: [alertname, cluster, namespace]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                - matchers:
                    - alertname="Watchdog"
                  receiver: "null"
            receivers:
              - name: "null"
          alertmanagerSpec:
            alertmanagerConfigSelector: {}
            alertmanagerConfigMatcherStrategy:
              type: None
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 2Gi
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true

path: apps/metrics
namespace: metrics
releaseName: metrics
syncWave: 0
podSecurity: privileged
syncOptions:
  - ServerSideApply=true
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  kube-prometheus-stack:
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 30d
        externalLabels:
          cluster: "{{ .Values.cluster.name }}"
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
