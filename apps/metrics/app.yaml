path: apps/metrics
namespace: metrics
releaseName: metrics
syncWave: 0
podSecurity: privileged
syncOptions:
  - ServerSideApply=true
defaultDeploy: true
netbird:
  policy:
    rules:
      - sources: ["team-infra-plat", "team-sec-plat", "app:metrics"]
        protocol: tcp
        ports: ["80", "443", "9090", "3100"]
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  snmpExporter:
    enabled: false
    image:
      repository: prom/snmp-exporter
      tag: "v0.26.0"
    community: "public"
  kube-prometheus-stack:
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 2h
        externalLabels:
          cluster: "{{ .Values.cluster.name }}"
        ruleSelectorNilUsesHelmValues: false
        ruleSelector:
          matchLabels:
            prometheus: "none"
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        additionalAlertManagerConfigs:
          - static_configs:
              - targets: ["REDACTED:80"]
        remoteWrite:
          - name: prometheus-aggregator
            url: "http://REDACTED:9090/api/v1/write"
            remoteTimeout: 2m
            queueConfig:
              maxSamplesPerSend: 500
        volumes:
          - name: netbird-run
            emptyDir: {}
          - name: netbird-lib
            emptyDir: {}
        initContainers:
          - name: nb-client
            image: "ghcr.io/netbirdio/netbird:0.72.4"
            restartPolicy: Always
            startupProbe:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "netbird status 2>/dev/null | grep -qi connected"
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 60
            env:
              - name: NB_SETUP_KEY
                valueFrom:
                  secretKeyRef:
                    name: setup-key-metrics  # pragma: allowlist secret
                    key: setup-key  # pragma: allowlist secret
              - name: NB_MANAGEMENT_URL
                value: https://api.netbird.io
              - name: NB_LOG_LEVEL
                value: info
              - name: NB_LOG_FILE
                value: console
              - name: NB_DISABLE_PROFILES
                value: "true"
              - name: NB_DISABLE_UPDATE_SETTINGS
                value: "true"
              - name: NB_DAEMON_ADDR
                value: unix:///var/run/netbird/netbird.sock
              - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
                value: "0"
            securityContext:
              privileged: true
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                add:
                  - NET_ADMIN
                  - SYS_RESOURCE
                  - SYS_ADMIN
            volumeMounts:
              - name: netbird-run
                mountPath: /var/run/netbird
              - name: netbird-lib
                mountPath: /var/lib/netbird
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
  metrics-server:
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
  alloy:
    alloy:
      configMap:
        content: |-
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "__host__"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.write.loki.receiver]
          }

          loki.source.kubernetes_events "events" {
            job_name   = "integrations/kubernetes/eventhandler"
            log_format = "logfmt"
            forward_to = [loki.write.loki.receiver]
          }

          loki.write "loki" {
            endpoint {
              url = "http://REDACTED:3100/loki/api/v1/push"
            }
            external_labels = {
              cluster = "{{ .Values.cluster.name }}",
            }
          }
    controller:
      volumes:
        extra:
          - name: netbird-run
            emptyDir: {}
          - name: netbird-lib
            emptyDir: {}
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      initContainers:
        - name: nb-client
          image: "ghcr.io/netbirdio/netbird:0.72.4"
          restartPolicy: Always
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "netbird status 2>/dev/null | grep -qi connected"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: setup-key-metrics  # pragma: allowlist secret
                  key: setup-key  # pragma: allowlist secret
            - name: NB_MANAGEMENT_URL
              value: https://api.netbird.io
            - name: NB_LOG_LEVEL
              value: info
            - name: NB_LOG_FILE
              value: console
            - name: NB_DISABLE_PROFILES
              value: "true"
            - name: NB_DISABLE_UPDATE_SETTINGS
              value: "true"
            - name: NB_DAEMON_ADDR
              value: unix:///var/run/netbird/netbird.sock
            - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
              value: "0"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - SYS_RESOURCE
                - SYS_ADMIN
          volumeMounts:
            - name: netbird-run
              mountPath: /var/run/netbird
            - name: netbird-lib
              mountPath: /var/lib/netbird
