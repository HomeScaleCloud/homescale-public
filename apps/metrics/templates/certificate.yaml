{{- if eq .Values.cluster.name "boa1-prod" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: metrics-tls
  namespace: metrics
spec:
  secretName: metrics-tls
  issuerRef:
    name: {{ .Values.certIssuer | default "letsencrypt" }}
    kind: ClusterIssuer
{{- $homescale := default (dict) .Values.homescale }}
{{- /* pre-existing hardcoded names, kept for backwards compatibility */}}
{{- $staticNames := list "REDACTED" "REDACTED" }}
{{- $dnsNames := concat (default (list) $homescale.exposePublicFqdns) (default (list) $homescale.netbirdCnameFqdns) $staticNames | uniq }}
  dnsNames:
{{- range $dnsNames }}
    - {{ . }}
{{- end }}
{{- end }}
