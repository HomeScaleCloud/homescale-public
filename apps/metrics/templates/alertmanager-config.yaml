{{- if eq .Values.cluster.name "boa1-prod" }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: slack
  namespace: metrics
spec:
  route:
    receiver: discard
    groupBy: [alertname, cluster, namespace]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    matchers:
      - name: alertname
        value: Watchdog
        matchType: "!="
    routes:
      - receiver: slack
        matchers:
          - name: severity
            value: critical
            matchType: "="
      - receiver: slack
        matchers:
          - name: alertname
            value: KubePodCrashLooping
            matchType: "="
  receivers:
    - name: discard
    - name: slack
      slackConfigs:
        - apiURL:
            name: metrics-alertmanager-slack  # pragma: allowlist secret
            key: SLACK_WEBHOOK_URL
          channel: "#alerts"
          sendResolved: false
          color: {{ `'{{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.severity "critical" }}danger{{ else if eq .CommonLabels.severity "warning" }}warning{{ else }}#439FE0{{ end }}'` }}
          title: {{ `'{{ if eq .Status "resolved" }}✅  RESOLVED{{ else }}{{ if eq .CommonLabels.severity "critical" }}🔴{{ else if eq .CommonLabels.severity "warning" }}🟡{{ else }}🔵{{ end }}  [FIRING:{{ len .Alerts.Firing }}]{{ end }}  {{ .CommonLabels.alertname }}  •  {{ .CommonLabels.cluster }}'` }}
          titleLink: {{ `'{{ if .CommonAnnotations.runbook_url }}{{ .CommonAnnotations.runbook_url }}{{ else }}https://REDACTED{{ end }}'` }}
          text: {{ `'{{ if eq .Status "firing" }}{{ range .Alerts.Firing }}{{ if .Annotations.summary }}*{{ .Annotations.summary }}*{{ "\n" }}{{ end }}{{ if .Annotations.description }}{{ .Annotations.description }}{{ "\n" }}{{ end }}{{ if or .Labels.namespace .Labels.pod .Labels.node .Labels.service }}{{ if .Labels.namespace }}*Namespace:* {{ .Labels.namespace }}{{ end }}{{ if .Labels.pod }}  ·  *Pod:* {{ .Labels.pod }}{{ end }}{{ if .Labels.node }}  ·  *Node:* {{ .Labels.node }}{{ end }}{{ if .Labels.service }}  ·  *Service:* {{ .Labels.service }}{{ end }}{{ "\n" }}{{ end }}<{{ .GeneratorURL }}|Prometheus>  ·  <https://REDACTED|Grafana>{{ "\n" }}{{ end }}{{ end }}'` }}
          fields:
            - title: Severity
              value: {{ `'{{ .CommonLabels.severity }}'` }}
              short: true
            - title: Namespace
              value: {{ `'{{ .CommonLabels.namespace }}'` }}
              short: true
          iconEmoji: ":bell:"
{{- end }}
