{{- if eq .Values.cluster.name "boa1-prod" }}
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: metrics
spec:
  type: ClusterIP
  ports:
    - name: http-web
      port: 443
      protocol: TCP
      targetPort: 3000
  selector:
    app.kubernetes.io/name: grafana
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: metrics
spec:
  type: ClusterIP
  ports:
    - name: http-web
      port: 80
      protocol: TCP
      targetPort: http-web
  selector:
    app.kubernetes.io/name: alertmanager
{{- end }}
