{{- if eq .Values.cluster.name "boa1-prod" }}
apiVersion: v1
kind: Service
metadata:
  name: "prometheus"
spec:
  type: ClusterIP
  ports:
    - name: http-web
      port: 9090
      protocol: TCP
      targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: aggregator
{{- end }}
