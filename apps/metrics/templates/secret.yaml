{{- if eq .Values.cluster.name "boa1-prod" }}
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-grafana-oauth
  namespace: metrics
spec:
  syncConfig:
    resyncInterval: 60s
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "homescale"
        envSlug: "prod"
        secretsPath: "/k8s/metrics/grafana"
      credentialsRef:
        secretName: infisical-operator-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: grafana-oauth  # pragma: allowlist secret
      secretNamespace: metrics
      creationPolicy: Owner
      secretType: Opaque
      template:
        includeAllSecrets: true
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-alertmanager-slack
  namespace: metrics
spec:
  syncConfig:
    resyncInterval: 60s
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "homescale"
        envSlug: "prod"
        secretsPath: "/k8s/metrics/alertmanager"
      credentialsRef:
        secretName: infisical-operator-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: metrics-alertmanager-slack  # pragma: allowlist secret
      secretNamespace: metrics
      creationPolicy: Owner
      secretType: Opaque
      template:
        includeAllSecrets: true
{{- end }}
