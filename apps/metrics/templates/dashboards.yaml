{{- if eq .Values.cluster.name "boa1-prod" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: metrics
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- if ne (base $path) "node-exporter-full.json" }}
  {{ base $path }}: |
    {{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-node-exporter
  namespace: metrics
data:
  node-exporter-full.json: |
    {{ $.Files.Get "dashboards/node-exporter-full.json" | nindent 4 }}
{{- end }}
