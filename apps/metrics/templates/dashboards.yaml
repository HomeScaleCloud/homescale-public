{{- if eq .Values.cluster.name "boa1-prod" }}
{{- $dashboards := list
  "argocd-overview"
  "k8s-addons-prometheus"
  "k8s-events-exporter"
  "k8s-system-api-server"
  "k8s-system-coredns"
  "k8s-views-global"
  "k8s-views-namespaces"
  "k8s-views-nodes"
  "k8s-views-pods"
  "longhorn"
  "volsync"
}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: metrics
data:
{{- range $dashboards }}
  {{ . }}.json: |
    {{ $.Files.Get (printf "dashboards/%s.json" .) | nindent 4 }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-node-exporter
  namespace: metrics
data:
  node-exporter-full.json: |
    {{ $.Files.Get "dashboards/node-exporter-full.json" | nindent 4 }}
{{- end }}
