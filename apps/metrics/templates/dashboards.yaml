{{- if eq .Values.cluster.name "boa1-prod" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: metrics
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |
    {{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- range $path, $_ := .Files.Glob "dashboards/*.yaml" }}
  {{ base $path | trimSuffix ".yaml" }}.json: |
    {{ $.Files.Get $path | fromYaml | toJson | nindent 4 }}
{{- end }}
{{- end }}
