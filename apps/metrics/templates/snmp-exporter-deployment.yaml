{{- if .Values.snmpExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: snmp-exporter
          image: "{{ .Values.snmpExporter.image.repository }}:{{ .Values.snmpExporter.image.tag }}"
          args:
            - --config.file=/etc/snmp-exporter/snmp.yml
          ports:
            - name: http
              containerPort: 9116
          readinessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/snmp-exporter
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: snmp-exporter-config
{{- end }}
