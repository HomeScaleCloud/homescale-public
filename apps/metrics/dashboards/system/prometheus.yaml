        values: false
      text: {}
      textMode: value
    fieldConfig:
      defaults:
        mappings: []
        noValue: '0'
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: red
              value: 1
      overrides: []
    pluginVersion: 10.0.1
    targets:
      - datasource:
