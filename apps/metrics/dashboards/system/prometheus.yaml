title: Prometheus
uid: k8s_addons_prometheus
description: 'This is a modern ''Prometheus'' dashboard for your Kubernetes cluster(s). Made for kube-prometheus-stack and take advantage of the latest Grafana features. GitHub repository: https://github.com/dotdc/grafana-dashboards-kubernetes'
tags:
  - Kubernetes
  - Prometheus
editable: true
graphTooltip: 1
refresh: 30s
schemaVersion: 38
version: 9
time:
  from: now-15m
  to: now
timepicker: {}
fiscalYearStartMonth: 0
links: []
annotations:
  list:
    - builtIn: 1
      datasource:
        type: datasource
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
templating:
  list:
    - current:
        selected: true
        text: Prometheus
        value: Prometheus
      hide: 0
      includeAll: false
      multi: false
      name: datasource
      options: []
      query: prometheus
      queryValue: ''
      refresh: 1
      regex: ''
      skipUrlSync: false
      type: datasource
    - current:
        isNone: true
        selected: false
        text: None
        value: ''
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(kube_node_info,cluster)
      hide: 0
      includeAll: true
      multi: false
      name: cluster
      options: []
      query:
        qryType: 1
        query: label_values(kube_node_info,cluster)
        refId: PrometheusVariableQueryEditor-VariableQuery
      refresh: 1
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
    - allValue: .*
      current:
        selected: false
        text: All
        value: $__all
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(prometheus_build_info{cluster=~"$cluster"}, pod)
      hide: 0
      includeAll: true
      multi: false
      name: pod
      options: []
      query:
        query: label_values(prometheus_build_info{cluster=~"$cluster"}, pod)
        refId: StandardVariableQuery
      refresh: 2
      regex: ''
      skipUrlSync: false
      sort: 1
      tagValuesQuery: ''
      tagsQuery: ''
      type: query
      useTags: false
    - current:
        selected: false
        text: 30s
        value: 30s
      hide: 0
      includeAll: false
      multi: false
      name: resolution
      options:
        - selected: false
          text: 1s
          value: 1s
        - selected: false
          text: 15s
          value: 15s
        - selected: true
          text: 30s
          value: 30s
        - selected: false
          text: 1m
          value: 1m
        - selected: false
          text: 3m
          value: 3m
        - selected: false
          text: 5m
          value: 5m
      query: 1s, 15s, 30s, 1m, 3m, 5m
      queryValue: ''
      skipUrlSync: false
      type: custom
panels:
  - type: row
    title: Information
    id: 89
    collapsed: false
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 0
    panels: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        refId: A
  - type: stat
    title: Prometheus version
    id: 78
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 0
      'y': 1
    options:
      colorMode: value
      graphMode: none
      justifyMode: auto
      orientation: auto
      reduceOptions:
        calcs:
          - last
        fields: ''
        values: false
      text: {}
      textMode: name
    fieldConfig:
      defaults:
        mappings: []
        noValue: '?'
        thresholds:
          mode: absolute
          steps:
            - color: orange
              value: null
      overrides: []
    pluginVersion: 10.0.1
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        editorMode: code
        exemplar: false
        expr: prometheus_build_info{pod=~"$pod", cluster=~"$cluster"}
        instant: true
        interval: ''
        legendFormat: '{{ version }}'
        range: false
        refId: A
  - type: stat
    title: Instance Down
    id: 92
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 6
