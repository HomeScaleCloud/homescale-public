            tooltip: false
            viz: false
          insertNulls: false
          lineInterpolation: smooth
          lineWidth: 2
          pointSize: 5
          scaleDistribution:
            type: linear
          showPoints: never
          spanNulls: false
          stacking:
            group: A
            mode: none
          thresholdsStyle:
            mode: 'off'
        mappings: []
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: red
              value: 80
        unit: short
      overrides: []
    pluginVersion: 8.3.3
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: sum(kube_pod_info{namespace=~"$namespace", cluster=~"$cluster"})
