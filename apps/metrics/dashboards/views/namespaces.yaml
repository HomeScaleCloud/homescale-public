      reduceOptions:
        calcs:
          - lastNotNull
        fields: ''
        values: false
      showPercentChange: false
      text: {}
      textMode: auto
      wideLayout: true
    fieldConfig:
      defaults:
        mappings: []
        noValue: '0'
        thresholds:
          mode: absolute
          steps:
            - color: rgb(255, 255, 255)
              value: null
        unit: none
