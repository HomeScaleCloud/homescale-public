          showLabels: false
          showTime: true
          sortOrder: Descending
          wrapLogMessage: true
        targets:
          - datasource:
              type: loki
              uid: loki
            editorMode: code
            expr: '{cluster=~"$cluster", job="integrations/kubernetes/eventhandler", namespace=~"$namespace"} | logfmt | name=~`$pod`'
            queryType: range
            refId: A
