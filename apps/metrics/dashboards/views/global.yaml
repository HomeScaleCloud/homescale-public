title: Global
uid: k8s_views_global
description: 'This is a modern ''Global View'' dashboard for your Kubernetes cluster(s). Made for kube-prometheus-stack and take advantage of the latest Grafana features. GitHub repository: https://github.com/dotdc/grafana-dashboards-kubernetes'
tags:
  - Kubernetes
  - Prometheus
editable: true
graphTooltip: 1
refresh: 30s
schemaVersion: 39
version: 45
time:
  from: now-1h
  to: now
timepicker: {}
fiscalYearStartMonth: 0
links: []
annotations:
  list:
    - builtIn: 1
      datasource:
        type: datasource
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
templating:
  list:
    - current:
        selected: false
        text: ''
        value: ''
      hide: 0
      includeAll: false
      multi: false
      name: datasource
      options: []
      query: prometheus
      queryValue: ''
      refresh: 1
      regex: ''
      skipUrlSync: false
      type: datasource
    - current: {}
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(kube_node_info,cluster)
      hide: 0
      includeAll: true
      multi: false
      name: cluster
      options: []
      query:
        qryType: 1
        query: label_values(kube_node_info,cluster)
        refId: PrometheusVariableQueryEditor-VariableQuery
      refresh: 1
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
    - current:
        selected: false
        text: 30s
        value: 30s
      hide: 0
      includeAll: false
      multi: false
      name: resolution
      options:
        - selected: false
          text: 1s
          value: 1s
        - selected: false
          text: 15s
          value: 15s
        - selected: true
          text: 30s
          value: 30s
        - selected: false
          text: 1m
          value: 1m
        - selected: false
          text: 3m
          value: 3m
        - selected: false
          text: 5m
          value: 5m
      query: 1s, 15s, 30s, 1m, 3m, 5m
      queryValue: ''
      skipUrlSync: false
      type: custom
    - current:
        selected: false
        text: ''
        value: ''
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(node_cpu_seconds_total{cluster=~"$cluster"},job)
      hide: 0
      includeAll: false
      multi: true
      name: job
      options: []
      query:
        qryType: 1
        query: label_values(node_cpu_seconds_total{cluster=~"$cluster"},job)
        refId: PrometheusVariableQueryEditor-VariableQuery
      refresh: 1
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
panels:
  - type: row
    title: Alerts
    id: 89
    collapsed: true
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 0
    panels:
      - type: state-timeline
        title: Alert Timeline
        id: 90
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 1
        options:
          alignValue: left
          legend:
            displayMode: list
            placement: bottom
            showLegend: true
          mergeValues: true
          rowHeight: 0.9
          showValue: auto
          tooltip:
            mode: single
            sort: none
        fieldConfig:
          defaults:
            color:
              mode: thresholds
            custom:
              fillOpacity: 70
              hideFrom:
                legend: false
                tooltip: false
                viz: false
              lineWidth: 0
              spanNulls: false
            mappings:
              - type: value
                options:
                  '1':
                    color: yellow
                    index: 0
                    text: Warning / Pending
                  '2':
                    color: red
                    index: 1
                    text: Critical (Firing)
            thresholds:
              mode: absolute
              steps:
                - color: green
                  value: null
                - color: yellow
                  value: 1
                - color: red
                  value: 2
          overrides: []
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: max without (alertstate) ((ALERTS{cluster=~"$cluster", severity="critical", alertstate="firing"} * 2) or (ALERTS{cluster=~"$cluster", alertstate="pending"} * 1) or (ALERTS{cluster=~"$cluster", severity="warning"} * 1))
            legendFormat: '{{alertname}} [{{severity}}]'
            range: true
            instant: false
            refId: A
      - type: table
        title: Active Alerts
        id: 91
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 9
        options:
          cellHeight: sm
          footer:
            countRows: false
            fields: ''
            reducer:
              - sum
            show: false
          showHeader: true
          sortBy:
            - desc: false
              displayName: alertname
        fieldConfig:
          defaults:
            custom:
              align: auto
              cellOptions:
                type: auto
              inspect: false
          overrides:
            - matcher:
                id: byName
                options: cluster
              properties:
                - id: custom.width
                  value: 140
            - matcher:
                id: byName
                options: alertname
              properties:
                - id: custom.width
                  value: 300
            - matcher:
                id: byName
                options: alertstate
              properties:
                - id: custom.width
                  value: 90
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        firing:
                          color: red
                          index: 0
                          text: firing
                        pending:
                          color: yellow
                          index: 1
                          text: pending
            - matcher:
                id: byName
                options: severity
              properties:
                - id: custom.width
                  value: 100
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        warning:
                          color: yellow
                          index: 0
                          text: warning
                        critical:
                          color: red
                          index: 1
                          text: critical
                        info:
                          color: blue
                          index: 2
                          text: info
            - matcher:
                id: byName
                options: namespace
              properties:
                - id: links
                  value:
                    - title: Namespace details
                      url: /d/k8s_views_ns/kubernetes-views-namespaces?${datasource:queryparam}&${cluster:queryparam}&var-namespace=${__value.text}&${resolution:queryparam}&${__url_time_range}
                      targetBlank: true
            - matcher:
                id: byName
                options: pod
              properties:
                - id: links
                  value:
                    - title: Pod details
                      url: /d/k8s_views_pods/kubernetes-views-pods?${datasource:queryparam}&${cluster:queryparam}&var-namespace=${__data.fields.namespace}&var-pod=${__value.text}&${resolution:queryparam}&${__url_time_range}
                      targetBlank: true
            - matcher:
                id: byName
                options: node
              properties:
                - id: links
                  value:
                    - title: Node details
                      url: /d/k8s_views_nodes/kubernetes-views-nodes?${datasource:queryparam}&${cluster:queryparam}&var-node=${__value.text}&${resolution:queryparam}&${__url_time_range}
                      targetBlank: true
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: ALERTS{cluster=~"$cluster", alertstate=~"firing|pending"}
            instant: true
            format: table
            legendFormat: ''
            refId: A
        transformations:
          - id: organize
            options:
              excludeByName:
                Time: true
                Value: true
                __name__: true
                endpoint: true
                instance: true
                job: true
                prometheus: true
                prometheus_replica: true
                service: true
                container: true
              indexByName:
                alertname: 0
                alertstate: 1
                severity: 2
                namespace: 3
                pod: 4
                cluster: 5
                node: 6
                Time: 7
                Value: 8
                __name__: 9
                endpoint: 10
                instance: 11
                job: 12
                prometheus: 13
                prometheus_replica: 14
                service: 15
                container: 16
              renameByName: {}
  - type: row
    title: Overview
    id: 67
    collapsed: false
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 1
    panels: []
  - type: bargauge
    title: Global CPU  Usage
    id: 77
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 8
      w: 6
      x: 0
      'y': 2
    options:
      displayMode: lcd
      maxVizHeight: 300
      minVizHeight: 10
      minVizWidth: 0
      namePlacement: auto
      orientation: horizontal
      reduceOptions:
        calcs:
          - lastNotNull
        fields: ''
        values: false
      showUnfilled: true
      sizing: auto
      valueMode: color
    fieldConfig:
      defaults:
        color:
          mode: continuous-GrYlRd
        mappings: []
        max: 1
        min: 0
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: red
              value: 80
        unit: percentunit
      overrides: []
    pluginVersion: 11.2.0
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        editorMode: code
        exemplar: true
        expr: avg(sum by (instance, cpu) (rate(node_cpu_seconds_total{mode!~"idle|iowait|steal", cluster=~"$cluster", job="$job"}[$__rate_interval])))
        interval: ''
        legendFormat: Real
        range: true
        refId: Real
      - datasource:
          type: prometheus
          uid: ${datasource}
        editorMode: code
        expr: sum(kube_pod_container_resource_requests{resource="cpu", cluster=~"$cluster"} and on(namespace, pod) max by (namespace, pod) (kube_pod_status_phase{phase="Running", cluster=~"$cluster"} == 1)) / sum(machine_cpu_cores{cluster=~"$cluster"})
        hide: false
        legendFormat: Requests
        range: true
        refId: Requests
      - datasource:
          type: prometheus
          uid: ${datasource}
        editorMode: code
        expr: sum(kube_pod_container_resource_limits{resource="cpu", cluster=~"$cluster"} and on(namespace, pod) max by (namespace, pod) (kube_pod_status_phase{phase="Running", cluster=~"$cluster"} == 1)) / sum(machine_cpu_cores{cluster=~"$cluster"})
        hide: false
        legendFormat: Limits
        range: true
        refId: Limits
