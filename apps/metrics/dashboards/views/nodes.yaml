      reduceOptions:
        calcs:
          - lastNotNull
        fields: ''
        values: false
      showThresholdLabels: false
      showThresholdMarkers: true
      sizing: auto
      text: {}
    fieldConfig:
      defaults:
        decimals: 2
        mappings: []
        max: 1
        min: 0
        thresholds:
