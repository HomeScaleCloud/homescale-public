title: Nodes
uid: k8s_views_nodes
description: 'This is a modern ''Nodes View'' dashboard for your Kubernetes cluster(s). Made for kube-prometheus-stack and take advantage of the latest Grafana features. GitHub repository: https://github.com/dotdc/grafana-dashboards-kubernetes'
tags:
  - Kubernetes
  - Prometheus
editable: true
graphTooltip: 1
refresh: 30s
schemaVersion: 39
version: 40
time:
  from: now-1h
  to: now
timepicker: {}
fiscalYearStartMonth: 0
links: []
annotations:
  list:
    - builtIn: 1
      datasource:
        type: datasource
        uid: grafana
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      target:
        limit: 100
        matchAny: false
        tags: []
        type: dashboard
      type: dashboard
templating:
  list:
    - current: {}
      hide: 0
      includeAll: false
      multi: false
      name: datasource
      options: []
      query: prometheus
      queryValue: ''
      refresh: 1
      regex: ''
      skipUrlSync: false
      type: datasource
    - current: {}
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(kube_node_info,cluster)
      hide: 0
      includeAll: true
      multi: false
      name: cluster
      options: []
      query:
        qryType: 1
        query: label_values(kube_node_info,cluster)
        refId: PrometheusVariableQueryEditor-VariableQuery
      refresh: 1
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
    - current:
        selected: false
        text: 30s
        value: 30s
      hide: 0
      includeAll: false
      multi: false
      name: resolution
      options:
        - selected: false
          text: 1s
          value: 1s
        - selected: false
          text: 15s
          value: 15s
        - selected: true
          text: 30s
          value: 30s
        - selected: false
          text: 1m
          value: 1m
        - selected: false
          text: 3m
          value: 3m
        - selected: false
          text: 5m
          value: 5m
      query: 1s, 15s, 30s, 1m, 3m, 5m
      queryValue: ''
      skipUrlSync: false
      type: custom
    - current: {}
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(kube_node_info{cluster=~"$cluster"}, node)
      hide: 0
      includeAll: false
      multi: false
      name: node
      options: []
      query:
        query: label_values(kube_node_info{cluster=~"$cluster"}, node)
        refId: StandardVariableQuery
      refresh: 2
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
    - current: {}
      datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(node_uname_info{nodename=~"(?i:($node)(\\.[a-z0-9.-]+)?)", cluster=~"$cluster"}, instance)
      hide: 2
      includeAll: false
      multi: false
      name: instance
      options: []
      query:
        query: label_values(node_uname_info{nodename=~"(?i:($node)(\\.[a-z0-9.-]+)?)", cluster=~"$cluster"}, instance)
        refId: StandardVariableQuery
      refresh: 2
      regex: ''
      skipUrlSync: false
      sort: 1
      type: query
panels:
  - type: row
    title: Alerts
    id: 69
    collapsed: true
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 0
    panels:
      - type: state-timeline
        title: Alert Timeline
        id: 70
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 1
        options:
          alignValue: left
          legend:
            displayMode: list
            placement: bottom
            showLegend: true
          mergeValues: true
          rowHeight: 0.9
          showValue: auto
          tooltip:
            mode: single
            sort: none
        fieldConfig:
          defaults:
            color:
              mode: thresholds
            custom:
              fillOpacity: 70
              hideFrom:
                legend: false
                tooltip: false
                viz: false
              lineWidth: 0
              spanNulls: false
            mappings:
              - type: value
                options:
                  '1':
                    color: yellow
                    index: 0
                    text: Warning / Pending
                  '2':
                    color: red
                    index: 1
                    text: Critical (Firing)
            thresholds:
              mode: absolute
              steps:
                - color: green
                  value: null
                - color: yellow
                  value: 1
                - color: red
                  value: 2
          overrides: []
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: max without (alertstate) ((ALERTS{cluster=~"$cluster", node=~"$node", severity="critical", alertstate="firing"} * 2) or (ALERTS{cluster=~"$cluster", node=~"$node", alertstate="pending"} * 1) or (ALERTS{cluster=~"$cluster", node=~"$node", severity="warning"} * 1))
            legendFormat: '{{alertname}} [{{severity}}]'
            range: true
            instant: false
            refId: A
      - type: table
        title: Active Alerts
        id: 71
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 9
        options:
          cellHeight: sm
          footer:
            countRows: false
            fields: ''
            reducer:
              - sum
            show: false
          showHeader: true
          sortBy:
            - desc: false
              displayName: alertname
        fieldConfig:
          defaults:
            custom:
              align: auto
              cellOptions:
                type: auto
              inspect: false
          overrides:
            - matcher:
                id: byName
                options: cluster
              properties:
                - id: custom.width
                  value: 140
            - matcher:
                id: byName
                options: alertname
              properties:
                - id: custom.width
                  value: 300
            - matcher:
                id: byName
                options: alertstate
              properties:
                - id: custom.width
                  value: 90
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        firing:
                          color: red
                          index: 0
                          text: firing
                        pending:
                          color: yellow
                          index: 1
                          text: pending
            - matcher:
                id: byName
                options: severity
              properties:
                - id: custom.width
                  value: 100
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        warning:
                          color: yellow
                          index: 0
                          text: warning
                        critical:
                          color: red
                          index: 1
                          text: critical
                        info:
                          color: blue
                          index: 2
                          text: info
            - matcher:
                id: byName
                options: namespace
              properties:
                - id: links
                  value:
                    - title: Namespace details
                      url: /d/k8s_views_ns/kubernetes-views-namespaces?${datasource:queryparam}&${cluster:queryparam}&var-namespace=${__value.text}&${resolution:queryparam}&${__url_time_range}
                      targetBlank: true
            - matcher:
                id: byName
                options: pod
              properties:
                - id: links
                  value:
                    - title: Pod details
                      url: /d/k8s_views_pods/kubernetes-views-pods?${datasource:queryparam}&${cluster:queryparam}&var-namespace=${__data.fields.namespace}&var-pod=${__value.text}&${resolution:queryparam}&${__url_time_range}
                      targetBlank: true
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: ALERTS{cluster=~"$cluster", alertstate=~"firing|pending", node=~"$node"}
            instant: true
            format: table
            legendFormat: ''
            refId: A
        transformations:
          - id: organize
            options:
              excludeByName:
                Time: true
                Value: true
                __name__: true
                endpoint: true
                instance: true
                job: true
                prometheus: true
                prometheus_replica: true
                service: true
                container: true
              indexByName:
                alertname: 0
                alertstate: 1
                severity: 2
                namespace: 3
                pod: 4
                cluster: 5
                node: 6
                Time: 7
                Value: 8
                __name__: 9
                endpoint: 10
                instance: 11
                job: 12
                prometheus: 13
                prometheus_replica: 14
                service: 15
                container: 16
              renameByName: {}
