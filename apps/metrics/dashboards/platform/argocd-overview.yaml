            format: table
            instant: true
            intervalFactor: 1
            refId: A
        transformations:
          - id: filterFieldsByName
            options:
              include:
                names:
                  - name
                  - cluster
                  - health_status
                  - sync_status
                  - autosync_enabled
          - id: organize
            options:
              indexByName:
                name: 0
                cluster: 1
                health_status: 2
                sync_status: 3
                autosync_enabled: 4
              renameByName:
                name: Application
                cluster: Cluster
                health_status: Health
                sync_status: Sync
        fieldConfig:
          defaults:
            custom:
              align: auto
              displayMode: auto
            mappings: []
            thresholds:
              mode: absolute
              steps:
                - color: green
                  value: null
          overrides:
            - matcher:
                id: byName
                options: Application
              properties:
                - id: links
                  value:
                    - title: Open in ArgoCD
                      url: 'https://argocd-server.argocd.${__data.fields.Cluster}REDACTED/applications/${__data.fields.Application}'
                      targetBlank: true
            - matcher:
                id: byName
                options: Health
              properties:
                - id: custom.displayMode
                  value: color-background
                - id: mappings
                  value:
                    - type: value
                      options:
                        Healthy:
                          color: green
                          index: 0
                        Progressing:
                          color: blue
                          index: 1
                        Suspended:
                          color: orange
                          index: 2
                        Missing:
                          color: purple
                          index: 3
                        Degraded:
                          color: red
                          index: 4
                        Unknown:
                          color: white
                          index: 5
            - matcher:
