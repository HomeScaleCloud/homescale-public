title: VolSync
uid: volsync
tags:
  - volsync
  - backup
editable: true
graphTooltip: 1
refresh: 1m
schemaVersion: 38
version: 1
time:
  from: now-24h
  to: now
timepicker: {}
fiscalYearStartMonth: 0
links: []
annotations:
  list: []
templating:
  list:
    - current: {}
      hide: 0
      includeAll: false
      multi: false
      name: datasource
      options: []
      query: prometheus
      refresh: 1
      regex: ''
      type: datasource
    - datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(volsync_volume_out_of_sync, cluster)
      hide: 0
      includeAll: true
      multi: false
      name: cluster
      query:
        query: label_values(volsync_volume_out_of_sync, cluster)
        refId: StandardVariableQuery
      refresh: 2
      sort: 1
      type: query
    - datasource:
        type: prometheus
        uid: ${datasource}
      definition: label_values(volsync_volume_out_of_sync{cluster=~"$cluster"}, obj_namespace)
      hide: 0
      includeAll: true
      multi: true
      name: namespace
      query:
        query: label_values(volsync_volume_out_of_sync{cluster=~"$cluster"}, obj_namespace)
        refId: StandardVariableQuery
      refresh: 2
      sort: 1
      type: query
      allValue: .*
panels:
  - type: row
    title: Alerts
    id: 300
    collapsed: true
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 0
    panels:
      - type: state-timeline
        title: Alert Timeline
        id: 301
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 1
        options:
          alignValue: left
          legend:
            displayMode: list
            placement: bottom
            showLegend: true
          mergeValues: true
          rowHeight: 0.9
          showValue: auto
          tooltip:
            mode: single
            sort: none
        fieldConfig:
          defaults:
            color:
              mode: thresholds
            custom:
              fillOpacity: 70
              hideFrom:
                legend: false
                tooltip: false
                viz: false
              lineWidth: 0
              spanNulls: false
            mappings:
              - type: value
                options:
                  '1':
                    color: yellow
                    index: 0
                    text: Warning / Pending
                  '2':
                    color: red
                    index: 1
                    text: Critical
            thresholds:
              mode: absolute
              steps:
                - color: green
                  value: null
                - color: yellow
                  value: 1
                - color: red
                  value: 2
          overrides: []
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: (ALERTS{cluster=~"$cluster", alertname=~"VolSync.*", severity="critical"} * 2) or (ALERTS{cluster=~"$cluster", alertname=~"VolSync.*", alertstate=~"firing|pending"} * 1)
            legendFormat: '{{alertname}} [{{severity}}]'
            range: true
            instant: false
            refId: A
      - type: table
        title: Active Alerts
        id: 302
        datasource:
          type: prometheus
          uid: ${datasource}
        gridPos:
          h: 8
          w: 24
          x: 0
          'y': 9
        options:
          cellHeight: sm
          footer:
            countRows: false
            fields: ''
            reducer:
              - sum
            show: false
          showHeader: true
          sortBy:
            - desc: false
              displayName: alertname
        fieldConfig:
          defaults:
            custom:
              align: auto
              cellOptions:
                type: auto
              inspect: false
          overrides:
            - matcher:
                id: byName
                options: alertstate
              properties:
                - id: custom.width
                  value: 90
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        firing:
                          color: red
                          index: 0
                          text: firing
                        pending:
                          color: yellow
                          index: 1
                          text: pending
            - matcher:
                id: byName
                options: severity
              properties:
                - id: custom.width
                  value: 100
                - id: custom.cellOptions
                  value:
                    type: color-background
                    mode: basic
                - id: mappings
                  value:
                    - type: value
                      options:
                        warning:
                          color: yellow
                          index: 0
                          text: warning
                        critical:
                          color: red
                          index: 1
                          text: critical
            - matcher:
                id: byName
                options: alertname
              properties:
                - id: custom.width
                  value: 300
        targets:
          - datasource:
              type: prometheus
              uid: ${datasource}
            expr: ALERTS{cluster=~"$cluster", alertname=~"VolSync.*", alertstate=~"firing|pending"}
            instant: true
            format: table
            legendFormat: ''
            refId: A
        transformations:
          - id: organize
            options:
              excludeByName:
                Time: true
                Value: true
                __name__: true
                endpoint: true
                instance: true
                job: true
                prometheus: true
                prometheus_replica: true
                service: true
                container: true
              indexByName:
                alertname: 0
                alertstate: 1
                severity: 2
                cluster: 3
              renameByName: {}
  - type: row
    title: Logs
    id: 310
    collapsed: true
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 1
    panels:
      - type: logs
        title: VolSync Pod Logs (controller + mover jobs)
        id: 311
        datasource:
          type: loki
          uid: loki
        gridPos:
          h: 14
          w: 24
          x: 0
          'y': 2
        options:
          dedupStrategy: none
          enableLogDetails: true
          prettifyLogMessage: false
          showCommonLabels: false
          showLabels: false
          showTime: true
          sortOrder: Descending
          wrapLogMessage: true
        targets:
          - datasource:
              type: loki
              uid: loki
            editorMode: code
            expr: '{cluster=~"$cluster", namespace="volsync-system", pod=~"volsync-.*"}'
            queryType: range
            refId: A
  - type: row
    title: Overview
    id: 1
    collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 2
    panels: []
  - type: stat
    title: Out of Sync
    id: 2
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 0
      'y': 3
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: short
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: red
              value: 1
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: count(volsync_volume_out_of_sync{cluster=~"$cluster", obj_namespace=~"$namespace"} == 1) or vector(0)
        instant: true
        refId: A
  - type: stat
    title: Total Volumes
    id: 3
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 6
      'y': 3
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: short
        thresholds:
          mode: absolute
          steps:
            - color: blue
              value: null
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: count(volsync_volume_out_of_sync{cluster=~"$cluster", obj_namespace=~"$namespace"}) or vector(0)
        instant: true
        refId: A
  - type: stat
    title: Total Missed Intervals
    id: 4
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 12
      'y': 3
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: short
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: yellow
              value: 1
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: sum(volsync_missed_intervals_total{cluster=~"$cluster", obj_namespace=~"$namespace"}) or vector(0)
        instant: true
        refId: A
  - type: stat
    title: Avg Last Sync Duration
    id: 5
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 18
      'y': 3
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: s
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: yellow
              value: 300
            - color: red
              value: 3600
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: avg(volsync_sync_duration_seconds_sum{cluster=~"$cluster", obj_namespace=~"$namespace"} / volsync_sync_duration_seconds_count{cluster=~"$cluster", obj_namespace=~"$namespace"} > 0) or vector(0)
        instant: true
        refId: A
  - type: table
    title: Volume Status
    id: 6
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 10
      w: 24
      x: 0
      'y': 7
    options:
      cellHeight: sm
      footer:
        show: false
      showHeader: true
      sortBy:
        - displayName: obj_name
          desc: false
    fieldConfig:
      defaults:
        custom:
          align: auto
          cellOptions:
            type: auto
      overrides:
        - matcher:
            id: byName
            options: cluster
          properties:
            - id: custom.width
              value: 140
        - matcher:
            id: byName
            options: obj_name
          properties:
            - id: custom.width
              value: 250
        - matcher:
            id: byName
            options: obj_namespace
          properties:
            - id: custom.width
              value: 180
        - matcher:
            id: byName
            options: role
          properties:
            - id: custom.width
              value: 100
        - matcher:
            id: byName
            options: method
          properties:
            - id: custom.width
              value: 100
        - matcher:
            id: byName
            options: Status
          properties:
            - id: custom.cellOptions
              value:
                type: color-background
                mode: basic
            - id: custom.width
              value: 120
            - id: mappings
              value:
                - type: value
                  options:
                    '0':
                      color: green
                      index: 0
                      text: In Sync
                    '1':
                      color: red
                      index: 1
                      text: Out of Sync
            - id: thresholds
              value:
                mode: absolute
                steps:
                  - color: green
                    value: null
                  - color: red
                    value: 1
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: volsync_volume_out_of_sync{cluster=~"$cluster", obj_namespace=~"$namespace"}
        instant: true
        format: table
        refId: A
    transformations:
      - id: organize
        options:
          excludeByName:
            Time: true
            __name__: true
            endpoint: true
            instance: true
            job: true
            prometheus: true
            prometheus_replica: true
            service: true
          indexByName:
            obj_name: 0
            obj_namespace: 1
            cluster: 2
            role: 3
            method: 4
            Value: 5
            Time: 6
            __name__: 7
            endpoint: 8
            instance: 9
            job: 10
            prometheus: 11
            prometheus_replica: 12
            service: 13
          renameByName:
            Value: Status
  - type: row
    title: Sync Duration
    id: 7
    collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 17
    panels: []
  - type: timeseries
    title: Sync Duration per Volume
    id: 8
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 8
      w: 24
      x: 0
      'y': 18
    options:
      tooltip:
        mode: multi
        sort: desc
      legend:
        displayMode: table
        placement: bottom
        calcs:
          - lastNotNull
          - max
    fieldConfig:
      defaults:
        unit: s
        custom:
          lineWidth: 1
          fillOpacity: 5
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: rate(volsync_sync_duration_seconds_sum{cluster=~"$cluster", obj_namespace=~"$namespace"}[$__rate_interval]) / rate(volsync_sync_duration_seconds_count{cluster=~"$cluster", obj_namespace=~"$namespace"}[$__rate_interval]) > 0
        legendFormat: '{{obj_name}} / {{obj_namespace}} ({{role}})'
        refId: A
  - type: row
    title: PVC Coverage
    id: 11
    collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 26
    panels: []
  - type: table
    title: Bound PVCs without a VolSync ReplicationSource
    description: Bound PVCs that have no matching VolSync ReplicationSource. Not necessarily a problem — system PVCs, ephemeral storage, or intentionally unprotected volumes will appear here.
    id: 12
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 10
      w: 24
      x: 0
      'y': 27
    options:
      cellHeight: sm
      footer:
        show: false
      showHeader: true
      sortBy:
        - displayName: Namespace
          desc: false
    fieldConfig:
      defaults:
        custom:
          align: auto
          cellOptions:
            type: auto
      overrides:
        - matcher:
            id: byName
            options: cluster
          properties:
            - id: custom.width
              value: 140
        - matcher:
            id: byName
            options: Namespace
          properties:
            - id: custom.width
              value: 200
        - matcher:
            id: byName
            options: PVC
          properties:
            - id: custom.width
              value: 280
        - matcher:
            id: byName
            options: Storage Class
          properties:
            - id: custom.width
              value: 180
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: "(\n  kube_persistentvolumeclaim_info{cluster=~\"$cluster\", persistentvolumeclaim!~\".*volsync.*\"}\n  * on(namespace, persistentvolumeclaim) group_left()\n  kube_persistentvolumeclaim_status_phase{cluster=~\"$cluster\", phase=\"Bound\"}\n)\nunless on(namespace, persistentvolumeclaim)\nlabel_replace(\n  label_replace(\n    volsync_volume_out_of_sync{cluster=~\"$cluster\", role=\"source\"},\n    \"namespace\", \"$1\", \"obj_namespace\", \"(.*)\"\n  ),\n  \"persistentvolumeclaim\", \"$1\", \"obj_name\", \"(.*)\"\n)"
        instant: true
        format: table
        refId: A
    transformations:
      - id: organize
        options:
          excludeByName:
            Time: true
            Value: true
            __name__: true
            endpoint: true
            instance: true
            job: true
            prometheus: true
            prometheus_replica: true
            service: true
            volumename: true
          indexByName:
            namespace: 0
            persistentvolumeclaim: 1
            cluster: 2
            storageclass: 3
            Time: 4
            Value: 5
            __name__: 6
            endpoint: 7
            instance: 8
            job: 9
            prometheus: 10
            prometheus_replica: 11
            service: 12
            volumename: 13
          renameByName:
            namespace: Namespace
            persistentvolumeclaim: PVC
            storageclass: Storage Class
  - type: row
    title: Missed Intervals
    id: 9
    collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 37
    panels: []
  - type: timeseries
    title: Missed Sync Intervals
    id: 10
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 8
      w: 24
      x: 0
      'y': 38
    options:
      tooltip:
        mode: multi
        sort: desc
      legend:
        displayMode: table
        placement: bottom
        calcs:
          - lastNotNull
          - max
    fieldConfig:
      defaults:
        unit: short
        custom:
          lineWidth: 1
          fillOpacity: 5
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: increase(volsync_missed_intervals_total{cluster=~"$cluster", obj_namespace=~"$namespace"}[$__rate_interval])
        legendFormat: '{{obj_name}} / {{obj_namespace}} ({{role}})'
        refId: A
  - type: row
    title: Controller & Job Health
    id: 13
    collapsed: false
    gridPos:
      h: 1
      w: 24
      x: 0
      'y': 46
    panels: []
  - type: stat
    title: Controller Up
    id: 14
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 0
      'y': 47
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: short
        mappings:
          - type: value
            options:
              '0':
                color: red
                index: 1
                text: Down
              '1':
                color: green
                index: 0
                text: Up
        thresholds:
          mode: absolute
          steps:
            - color: red
              value: null
            - color: green
              value: 1
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: min(up{job="volsync-metrics", cluster=~"$cluster"})
        instant: true
        refId: A
  - type: stat
    title: Failed Mover Jobs (24h)
    id: 15
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 4
      w: 6
      x: 6
      'y': 47
    options:
      reduceOptions:
        calcs:
          - lastNotNull
      colorMode: background
      graphMode: none
      justifyMode: center
      textMode: auto
    fieldConfig:
      defaults:
        unit: short
        thresholds:
          mode: absolute
          steps:
            - color: green
              value: null
            - color: red
              value: 1
        color:
          mode: thresholds
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: sum(max_over_time(kube_job_status_failed{job_name=~"volsync-.*", cluster=~"$cluster"}[24h])) or vector(0)
        instant: true
        refId: A
  - type: timeseries
    title: Mover Job Failures
    id: 16
    datasource:
      type: prometheus
      uid: ${datasource}
    gridPos:
      h: 8
      w: 24
      x: 0
      'y': 51
    options:
      tooltip:
        mode: multi
        sort: desc
      legend:
        displayMode: table
        placement: bottom
        calcs:
          - lastNotNull
          - max
    fieldConfig:
      defaults:
        unit: short
        custom:
          lineWidth: 1
          fillOpacity: 5
      overrides: []
    targets:
      - datasource:
          type: prometheus
          uid: ${datasource}
        expr: kube_job_status_failed{job_name=~"volsync-.*", cluster=~"$cluster"} == 1
        legendFormat: '{{job_name}} / {{namespace}} ({{cluster}})'
        refId: A
