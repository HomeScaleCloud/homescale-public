        unit: amp
        decimals: 1
      overrides:
        - matcher:
            id: byFrameRefID
            options: warning
          properties:
            - id: color
              value:
                fixedColor: yellow
                mode: fixed
            - id: custom.lineStyle
              value:
                dash:
                  - 8
                  - 4
                fill: dash
            - id: custom.lineWidth
              value: 1
            - id: custom.fillOpacity
