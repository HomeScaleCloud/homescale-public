path: apps/argocd
namespace: argocd
releaseName: argocd
syncWave: -30
syncOptions:
  - ServerSideApply=true
ignoreDifferences:
  - group: ""
    kind: Secret
    name: argocd-secret
    jsonPointers:
      - /data
parameters:
  - name: "argo-cd.configs.cm.url"
    value: "https://argocd.{{ .Values.cluster.name }}xxx"
