argo-cd:
  crds:
    install: true
  configs:
    cm:
      timeout.reconciliation: "30s"
      oidc.config: |
        name: Entra ID
        issuer: $op-argocd:issuer
        clientID: $op-argocd:clientID
        clientSecret: $op-argocd:clientSecret
        requestedScopes:
          - openid
          - profile
          - email
        requestedIDTokenClaims:
          groups:
            essential: true
    params:
      application.operations.selfHealTimeout: "5"
