path: apps/argocd
namespace: argocd
releaseName: argocd
syncWave: -30
syncOptions:
  - ServerSideApply=true
ignoreDifferences:
  - group: ""
    kind: Secret
    name: argocd-secret
    jsonPointers:
      - /data
values:
  cluster:
    name: "{{ .Values.cluster.name }}"
  argo-cd:
    crds:
      install: true
    configs:
      cm:
        admin.enabled: "false"
        timeout.reconciliation: "30s"
        url: "https://argocd-server.argocd.{{ .Values.cluster.name }}xxx"
        oidc.config: |
          name: Entra ID
          issuer: $op-argocd:issuer
          clientID: $op-argocd:clientID
          clientSecret: $op-argocd:clientSecret
          requestedScopes:
            - openid
            - profile
            - email
          requestedIDTokenClaims:
            groups:
              essential: true
      rbac:
        scopes: "[groups]"
        policy.default: '{{ if eq .Values.cluster.name "lab" }}role:admin{{ end }}'
        policy.csv: |
          g, sg-k8s-admin, role:admin
          g, team-infra-plat, role:readonly
      params:
        application.operations.selfHealTimeout: "5"
