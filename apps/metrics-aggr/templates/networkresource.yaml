apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: prometheus
  namespace: metrics
spec:
  networkRouterRef:
    name: {{ required "cluster.name is required" .Values.cluster.name | quote }}
    namespace: netbird
  serviceRef:
    name: prometheus
  groups:
    - name: app-metrics
    - name: cluster-boa1-prod
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: loki
  namespace: metrics
spec:
  networkRouterRef:
    name: {{ required "cluster.name is required" .Values.cluster.name | quote }}
    namespace: netbird
  serviceRef:
    name: loki
  groups:
    - name: app-metrics
    - name: cluster-boa1-prod
