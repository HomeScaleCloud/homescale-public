apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: aggregator
  namespace: metrics
spec:
  serviceAccountName: prometheus-aggregator
  replicas: 1
  retention: 90d
  enableRemoteWriteReceiver: true
  serviceMonitorSelector:
    matchLabels:
      prometheus: aggregator
  podMonitorSelector:
    matchLabels:
      prometheus: aggregator
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
