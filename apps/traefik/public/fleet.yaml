defaultNamespace: traefik
name: traefik-public
helm:
  releaseName: traefik-public
  chart: ./
  takeOwnership: true
  force: true
  values:
    traefik:
      logs:
        general:
          level: DEBUG
      deployment:
        replicas: 2
      service:
        type: LoadBalancer
      ingressClass:
        enabled: true
        name: traefik-public
        isDefaultClass: false
      providers:
        kubernetesIngress:
          enabled: true
          ingressClass: traefik-public
          publishedService:
            enabled: true
        kubernetesCRD:
          enabled: true
          ingressClass: traefik-public
      additionalArguments:
        - "--providers.kubernetesingress.ingressclass=traefik-public"

overrideTargets:
  - clusterSelector:
      matchLabels:
        REDACTED/traefik-public: enabled
  - clusterSelector:
      matchLabels:
        REDACTED/env: mgmt
