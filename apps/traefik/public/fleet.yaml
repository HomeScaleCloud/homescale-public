defaultNamespace: traefik
name: traefik-public
helm:
  releaseName: traefik-public
  chart: ./
  takeOwnership: true
  force: true
  values:
    traefik:
      deployment:
        replicas: 2
      service:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: ingress.${ .ClusterName }.${ get .ClusterLabels \"xxx/region\" }.xxx
      ingressClass:
        enabled: true
        name: traefik-public
        isDefaultClass: false
      providers:
        kubernetesIngress:
          enabled: true
          ingressClass: traefik-public
          publishedService:
            enabled: true
        kubernetesCRD:
          enabled: true
          ingressClass: traefik-public
      additionalArguments:
        - "--providers.kubernetesingress.ingressclass=traefik-public"

overrideTargets:
  - clusterSelector:
      matchLabels:
        xxx/traefik-public: enabled

targetCustomizations:
  - name: mgmt
    clusterSelector:
      matchLabels:
        xxx/env: mgmt
    helm:
      values:
        traefik:
          service:
            annotations:
              external-dns.alpha.kubernetes.io/hostname: xxx
