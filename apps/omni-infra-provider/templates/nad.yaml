{{- with .Values.provider.address }}
{{- $region := required "provider.region is required" $.Values.provider.region -}}
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ $region }}-mgmt
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "bond0",
      "mode": "bridge",
      "ipam": {
        "type": "static"
      }
    }
{{- end }}
