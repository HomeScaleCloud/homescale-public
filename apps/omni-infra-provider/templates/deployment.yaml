{{- $region := required "provider.region is required" .Values.provider.region -}}
{{- $platform := required "provider.platform is required" .Values.provider.platform -}}
{{- $image := required (printf "unsupported platform: %s" $platform) (get .Values.provider.images $platform) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      {{- with .Values.provider.address }}
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":{{ printf "%s-mgmt" $region | quote }},"namespace":{{ $.Release.Namespace | quote }},"ips":[{{ . | quote }}]}]'
      {{- end }}
    spec:
      containers:
        - name: omni-infra-provider
          image: {{ $image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --omni-api-endpoint={{ .Values.omni.apiEndpoint }}
            - --id={{ $region }}-{{ $platform }}
            - --machine-labels=region={{ $region }},platform={{ $platform }}
            - --provider-name={{ $region }}-{{ $platform }}
            {{- if and (eq $platform "metal") (not (eq false .Values.provider.secureBootEnabled)) }}
            - --secure-boot-enabled
            {{- end }}
            - --api-advertise-address={{ required "provider.address is required" .Values.provider.address | splitList "/" | first }}
          env:
            - name: OMNI_SERVICE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: omni-infra-provider
                  key: {{ $region }}-{{ $platform }} # pragma: allowlist secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: netbird
          image: {{ required "netbird.image is required" .Values.netbird.image | quote }}
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: setup-key-{{ .Release.Name }}-{{ $region }}-{{ $platform }}
                  key: setup-key # pragma: allowlist secret
            - name: NB_MANAGEMENT_URL
              value: https://api.netbird.io
            - name: NB_LOG_LEVEL
              value: info
            - name: NB_LOG_FILE
              value: console
            - name: NB_DISABLE_PROFILES
              value: "true"
            - name: NB_DISABLE_UPDATE_SETTINGS
              value: "true"
            - name: NB_DAEMON_ADDR
              value: unix:///var/run/netbird/netbird.sock
            - name: NB_ENTRYPOINT_SERVICE_TIMEOUT
              value: "0"
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_RESOURCE
                - SYS_ADMIN
          volumeMounts:
            - name: netbird-run
              mountPath: /var/run/netbird
            - name: netbird-lib
              mountPath: /var/lib/netbird
      volumes:
        - name: netbird-run
          emptyDir: {}
        - name: netbird-lib
          emptyDir: {}
