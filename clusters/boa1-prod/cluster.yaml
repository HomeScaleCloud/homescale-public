kind: Cluster
name: boa1-prod
kubernetes:
  version: v1.36.2
talos:
  version: v1.13.5
features:
  useEmbeddedDiscoveryService: true
  backupConfiguration:
    interval: 1h
patches:
  - file: patches/base.yaml
  - file: patches/allow-scheduling-on-control-plane.yaml
  - file: patches/longhorn.yaml
  # - file: patches/kubelet-certs.yaml
systemExtensions:
  - siderolabs/iscsi-tools
  - siderolabs/util-linux-tools
---
kind: ControlPlane
machines:
  - 4334c000-88da-11ea-8000-ac1f6be32b68
  - 828a9e00-06f8-11ea-8000-ac1f6bdcdf7c
  - 1c93d600-fd25-11eb-8000-3cecef8948e0
patches:
  - name: install-disk
    inline:
      machine:
        install:
          diskSelector:
            type: 'nvme'
  - name: scheduler-topology-spread
    inline:
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                pluginConfig:
                  - name: PodTopologySpread
                    args:
                      defaultConstraints:
                        - maxSkew: 1
                          topologyKey: kubernetes.io/hostname
                          whenUnsatisfiable: ScheduleAnyway
                      defaultingType: List
  - name: nics
    inline:
      machine:
        network:
          interfaces:
            - interface: bond0
              dhcp: true
              bond:
                mode: 802.3ad
                lacpRate: fast
                xmitHashPolicy: layer3+4
                miimon: 100
                interfaces:
                  - eno1
                  - eno2
                  - eno3
                  - eno4
              vlans:
                - vlanId: 241
