apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-boa1-prod
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: git@github.com:HomeScaleCloud/homescale.git
      targetRevision: main
      path: clusters/boa1-prod
      directory:
        recurse: true
        exclude: 'cluster.yaml'
    - repoURL: git@github.com:HomeScaleCloud/homescale.git
      targetRevision: main
      path: apps
      helm:
        releaseName: apps-boa1-prod
        values: |
          cluster:
            name: boa1-prod
            region: boa1
          apps:
            cloudflared:
              deploy: true
              values:
                cluster:
                  name: boa1-prod
            home-assistant:
              deploy: true
              values:
                zigbee2mqtt:
                  config:
                    serialPort: "tcp://10.1.246.11:6638"
            homepage:
              deploy: true
            longhorn:
              deploy: true
            maxmorris-io:
              deploy: true
            metrics:
              deploy: true
              values:
                snmpExporter:
                  enabled: true
                kube-prometheus-stack:
                  prometheus:
                    prometheusSpec:
                      additionalScrapeConfigs:
                        - job_name: pdu_01_boa1
                          scrape_interval: 60s
                          scrape_timeout: 30s
                          static_configs:
                            - targets: ['10.1.246.5']
                              labels:
                                location: boa1
                                device: ap7920-pdu
                          metrics_path: /snmp
                          params:
                            module: [apc_rpdu]
                            auth: [snmpv1_public]
                          relabel_configs:
                            - source_labels: [__address__]
                              target_label: __param_target
                            - source_labels: [__param_target]
                              target_label: instance
                            - target_label: __address__
                              replacement: snmp-exporter.metrics.svc.cluster.local:9116
                        - job_name: pdu_02_boa1
                          scrape_interval: 60s
                          scrape_timeout: 30s
                          static_configs:
                            - targets: ['10.1.246.6']
                              labels:
                                location: boa1
                                device: ap7920-pdu
                          metrics_path: /snmp
                          params:
                            module: [apc_rpdu]
                            auth: [snmpv1_public]
                          relabel_configs:
                            - source_labels: [__address__]
                              target_label: __param_target
                            - source_labels: [__param_target]
                              target_label: instance
                            - target_label: __address__
                              replacement: snmp-exporter.metrics.svc.cluster.local:9116
                        - job_name: unifi_udm_01_boa1
                          scrape_interval: 60s
                          scrape_timeout: 30s
                          static_configs:
                            - targets: ['10.1.240.1']
                              labels:
                                location: boa1
                                device: udm-01-boa1
                                role: gateway
                          metrics_path: /snmp
                          params:
                            module: [if_mib]
                            auth: [snmpv2_unifi]
                          relabel_configs:
                            - source_labels: [__address__]
                              target_label: __param_target
                            - source_labels: [__param_target]
                              target_label: instance
                            - target_label: __address__
                              replacement: snmp-exporter.metrics.svc.cluster.local:9116
                        - job_name: unifi_usw_24_01_boa1
                          scrape_interval: 60s
                          scrape_timeout: 30s
                          static_configs:
                            - targets: ['10.1.240.2']
                              labels:
                                location: boa1
                                device: usw-24-01-boa1
                                role: switch
                          metrics_path: /snmp
                          params:
                            module: [if_mib]
                            auth: [snmpv2_unifi]
                          relabel_configs:
                            - source_labels: [__address__]
                              target_label: __param_target
                            - source_labels: [__param_target]
                              target_label: instance
                            - target_label: __address__
                              replacement: snmp-exporter.metrics.svc.cluster.local:9116
                        - job_name: unifi_uap_02_boa1
                          scrape_interval: 60s
                          scrape_timeout: 30s
                          static_configs:
                            - targets: ['10.1.240.4']
                              labels:
                                location: boa1
                                device: uap-02-boa1
                                role: ap
                          metrics_path: /snmp
                          params:
                            module: [if_mib]
                            auth: [snmpv2_unifi]
                          relabel_configs:
                            - source_labels: [__address__]
                              target_label: __param_target
                            - source_labels: [__param_target]
                              target_label: instance
                            - target_label: __address__
                              replacement: snmp-exporter.metrics.svc.cluster.local:9116
                      remoteWrite:
                        - name: prometheus-aggregator
                          url: "http://prometheus.metrics.svc.cluster.local:9090/api/v1/write"
                  grafana:
                    enabled: true
                    service:
                      port: 443
                      targetPort: 3000
                    serviceMonitor:
                      enabled: true
                      scheme: https
                      tlsConfig:
                        insecureSkipVerify: true
                    grafana.ini:
                      server:
                        protocol: https
                        http_port: 3000
                        cert_file: /etc/grafana/tls/tls.crt
                        cert_key: /etc/grafana/tls/tls.key
                        domain: REDACTED
                        root_url: https://REDACTED
                      auth:
                        disable_login_form: true
                        oauth_auto_login: true
                        signout_redirect_url: "https://login.microsoftonline.com/common/oauth2/v2.0/logout"
                      auth.azuread:
                        enabled: true
                        name: Microsoft
                        allow_sign_up: true
                        scopes: "openid email profile"
                    envFromSecret: grafana-oauth  # pragma: allowlist secret
                    extraSecretMounts:
                      - name: tls
                        secretName: metrics-tls  # pragma: allowlist secret
                        mountPath: /etc/grafana/tls
                        readOnly: true
                    persistence:
                      enabled: true
                      storageClassName: longhorn
                      size: 5Gi
                    adminPassword: ""
                    deploymentStrategy:
                      type: Recreate
                    readinessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                        scheme: HTTPS
                    livenessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                        scheme: HTTPS
                    sidecar:
                      dashboards:
                        enabled: false
                      datasources:
                        enabled: false
                    dashboardProviders:
                      dashboardproviders.yaml:
                        apiVersion: 1
                        providers:
                          - name: views
                            orgId: 1
                            folder: 'Views'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/views
                          - name: system
                            orgId: 1
                            folder: 'System'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/system
                          - name: storage
                            orgId: 1
                            folder: 'Storage'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/storage
                          - name: networking
                            orgId: 1
                            folder: 'Networking'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/networking
                          - name: platform
                            orgId: 1
                            folder: 'Platform'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/platform
                          - name: environment
                            orgId: 1
                            folder: 'Environment'
                            type: file
                            disableDeletion: false
                            allowUiUpdates: false
                            updateIntervalSeconds: 30
                            options:
                              path: /var/lib/grafana/dashboards/environment
                    dashboardsConfigMaps:
                      views: grafana-dashboards-views
                      system: grafana-dashboards-system
                      storage: grafana-dashboards-storage
                      networking: grafana-dashboards-networking
                      platform: grafana-dashboards-platform
                      environment: grafana-dashboards-environment
                    datasources:
                      datasources.yaml:
                        apiVersion: 1
                        datasources:
                          - name: Prometheus
                            type: prometheus
                            url: http://prometheus.metrics.svc.cluster.local:9090
                            isDefault: true
                            uid: prometheus
                            jsonData:
                              httpMethod: POST
                              timeInterval: 30s
                          - name: Loki
                            type: loki
                            url: http://loki.metrics.svc.cluster.local:3100
                            uid: loki
                            jsonData:
                              maxLines: 1000
                    defaultDashboardsEnabled: false
                  alertmanager:
                    enabled: true
                    config:
                      global:
                        resolve_timeout: 5m
                      route:
                        group_by: [alertname, cluster, namespace]
                        group_wait: 30s
                        group_interval: 5m
                        repeat_interval: 12h
                        receiver: "null"
                        routes:
                          - matchers:
                              - alertname="Watchdog"
                            receiver: "null"
                      receivers:
                        - name: "null"
                    alertmanagerSpec:
                      alertmanagerConfigSelector: {}
                      alertmanagerConfigMatcherStrategy:
                        type: None
                      storage:
                        volumeClaimTemplate:
                          spec:
                            storageClassName: longhorn
                            resources:
                              requests:
                                storage: 2Gi
            metrics-aggr:
              deploy: true
              values:
                cluster:
                  name: boa1-prod
            multus:
              values:
                vlans:
                  wlan:
                    enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /metadata/finalizers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
