apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-core
  labels:
    REDACTED/managed: true
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/homescalecloud/helm
    chart: cluster
    targetRevision: 0.1.0
    helm:
      valuesObject:
        apps:
          ingress-nginx:
            ingress-nginx:
             controller:
               service:
                 annotations:
                   tailscale.com/hostname: "ingress-core"
                   tailscale.com/tags: "tag:app"

          metrics:
            kube-prometheus-stack:
              grafana:
                ingress:
                  hosts:
                    - REDACTED
                  tls:
                    - hosts:
                      - REDACTED
                grafana.ini:
                  server:
                    root_url: "https://REDACTED"

          onepassword:
            cluster:
              name: core

          tailscale:
            tailscale-operator:
              operatorConfig:
                hostname: k8s-core
              oauth:
                clientId: thing
                clientSecret: thing
            

  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true