apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-atlas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:HomeScaleCloud/homescale.git
    targetRevision: main
    path: apps
    helm:
      releaseName: apps-atlas
      values: |
        cluster:
          name: atlas
          region: boa1
          env: metal

        apps:
          argocd:
            enabled: true
          cert-manager:
            enabled: true
          cert-manager-crs:
            enabled: true
          onepassword:
            enabled: true
          rbac:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
