kind: Cluster
name: boa1-mgmtr
kubernetes:
  version: v1.36.1
talos:
  version: v1.13.4
features:
  backupConfiguration:
    interval: 1h
patches:
  - file: patches/base.yaml
  - file: patches/allow-scheduling-on-control-plane.yaml
---
kind: ControlPlane
region: boa1
machines:
  - 11a9fe00-3f45-11ed-8000-3cecefaab010
patches:
  - name: install-disk
    inline:
      machine:
        install:
          diskSelector:
            model: 'INTEL SSDPEKNW512G8H'
