---
- name: Check if ArgoCD is already installed
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: argocd-server
    namespace: argocd
  register: _argocd_server

- name: Install ArgoCD
  when: _argocd_server.resources | length == 0
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo-cd
    chart_repo_url: https://argoproj.github.io/argo-helm
    chart_version: "{{ argocd_chart_version }}"
    release_namespace: argocd
    create_namespace: false
    state: present
    wait: true
    wait_timeout: "300s"

- name: Deploy apps
  when: _argocd_server.resources | length == 0
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir | dirname | dirname | dirname }}/clusters/{{ omni_cluster_name }}/apps.yaml"
