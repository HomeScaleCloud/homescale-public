---
- name: Bootstrap Omni service accounts
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Install Python dependencies
      ansible.builtin.pip:
        name:
          - kubernetes
          - jmespath
        state: present

    - name: Check if Omni SA key already exists in Infisical
      ansible.builtin.uri:
        url: "https://app.infisical.com/api/v3/secrets/raw/OMNI_SERVICE_ACCOUNT_KEY\
              ?workspaceId={{ lookup('env', 'INFISICAL_WORKSPACE_ID') }}\
              &environment=production\
              &secretPath=/github-actions"
        headers:
          Authorization: "Bearer {{ lookup('env', 'INFISICAL_ACCESS_TOKEN') }}"
        status_code: [200, 404]
      register: _existing_sa_check
      no_log: true

    - name: Exit — Omni already bootstrapped
      ansible.builtin.meta: end_play
      when: _existing_sa_check.status == 200 and (_existing_sa_check.json.secret.secretValue | default('')) | length > 0

    - name: Fetch mgmt kubeconfig from Infisical
      ansible.builtin.uri:
        url: "https://app.infisical.com/api/v3/secrets/raw/MGMT_KUBECONFIG\
              ?workspaceId={{ lookup('env', 'INFISICAL_WORKSPACE_ID') }}\
              &environment=production\
              &secretPath=/github-actions"
        headers:
          Authorization: "Bearer {{ lookup('env', 'INFISICAL_ACCESS_TOKEN') }}"
        status_code: 200
      register: _kubeconfig_resp
      no_log: true

    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ _kubeconfig_resp.json.secret.secretValue }}"
        dest: /tmp/mgmt-kubeconfig
        mode: "0600"
      no_log: true

    - name: Get Omni pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: omni_pods

    - name: Fail if no Omni pod found
      ansible.builtin.fail:
        msg: "No Omni pod found in namespace omni"
      when: omni_pods.resources | length == 0

    - name: Wait for Omni pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: omni_pod_status
      until: >
        omni_pod_status.resources | length > 0 and
        omni_pod_status.resources[0].status.phase == 'Running' and
        (omni_pod_status.resources[0].status.containerStatuses | default([]) |
        selectattr('ready', 'equalto', true) | list | length > 0)
      retries: 30
      delay: 10

    - name: Wait for bootstrap SA key file to appear
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ omni_pods.resources[0].metadata.name }}"
        container: toolbox
        command: test -s /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _key_check
      until: (_key_check.return_code | default(1)) == 0
      retries: 12
      delay: 10
      failed_when: (_key_check.return_code | default(1)) != 0

    - name: Read bootstrap SA key from toolbox sidecar
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ omni_pods.resources[0].metadata.name }}"
        container: toolbox
        command: cat /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _bootstrap_key
      no_log: true

    - name: Create github-actions service account
      ansible.builtin.command:
        cmd: >
          omnictl serviceaccount create github-actions
          --use-user-role=false
          --role Admin
          --ttl 8760h
          --insecure-skip-tls-verify
      environment:
        OMNI_SERVICE_ACCOUNT_KEY: "{{ _bootstrap_key.stdout | trim }}"
        OMNI_ENDPOINT: https://xxx
      register: _new_sa_key
      changed_when: true

    - name: Store github-actions SA key in Infisical
      ansible.builtin.uri:
        url: "https://app.infisical.com/api/v3/secrets/raw/OMNI_SERVICE_ACCOUNT_KEY"
        method: POST
        headers:
          Authorization: "Bearer {{ lookup('env', 'INFISICAL_ACCESS_TOKEN') }}"
          Content-Type: "application/json"
        body_format: json
        body:
          workspaceId: "{{ lookup('env', 'INFISICAL_WORKSPACE_ID') }}"
          environment: "prod"
          secretPath: "/github-actions"
          secretValue: "{{ _new_sa_key.stdout | trim | regex_search('OMNI_SERVICE_ACCOUNT_KEY=(.+)', '\\1') | first }}"
        status_code: 200
      no_log: true
      changed_when: true

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/mgmt-kubeconfig
        - /tmp/omniconfig-bootstrap
