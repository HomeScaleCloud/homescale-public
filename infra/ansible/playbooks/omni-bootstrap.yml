---
- name: Bootstrap Omni service accounts
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Install Python dependencies
      ansible.builtin.pip:
        name:
          - kubernetes
          - jmespath
        state: present
    - name: Check if SA already exists
      block:
        - name: Look up existing SA key
          ansible.builtin.set_fact:
            _existing_sa_key: "{{ lookup('community.general.onepassword', 'omni', field='credential', vault='github-actions') }}"
          no_log: true
      rescue:
        - name: SA key not found — will bootstrap
          ansible.builtin.set_fact:
            _existing_sa_key: ""

    - name: Exit — Omni already bootstrapped
      ansible.builtin.meta: end_play
      when: _existing_sa_key | length > 0

    - name: Fetch mgmt kubeconfig from 1Password
      ansible.builtin.set_fact:
        _kubeconfig: "{{ lookup('community.general.onepassword', 'mgmt-kubeconfig', field='password', vault='github-actions') }}"
      no_log: true

    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ _kubeconfig }}"
        dest: /tmp/mgmt-kubeconfig
        mode: "0600"
      no_log: true

    - name: Get Omni pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: omni_pods

    - name: Fail if no Omni pod found
      ansible.builtin.fail:
        msg: "No Omni pod found in namespace omni"
      when: omni_pods.resources | length == 0

    - name: Wait for Omni pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: omni_pod_status
      until: >
        omni_pod_status.resources | length > 0 and
        omni_pod_status.resources[0].status.phase == 'Running' and
        (omni_pod_status.resources[0].status.containerStatuses | default([]) |
        selectattr('ready', 'equalto', true) | list | length > 0)
      retries: 30
      delay: 10

    - name: Wait for bootstrap SA key file to appear
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ omni_pods.resources[0].metadata.name }}"
        container: toolbox
        command: test -s /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _key_check
      until: (_key_check.return_code | default(1)) == 0
      retries: 12
      delay: 10
      failed_when: (_key_check.return_code | default(1)) != 0

    - name: Read bootstrap SA key from toolbox sidecar
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ omni_pods.resources[0].metadata.name }}"
        container: toolbox
        command: cat /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _bootstrap_key
      no_log: true

    - name: Create github-actions service account
      ansible.builtin.command:
        cmd: >
          omnictl serviceaccount create github-actions
          --use-user-role=false
          --role Admin
          --ttl 8760h
      environment:
        OMNI_SERVICE_ACCOUNT_KEY: "{{ _bootstrap_key.stdout | trim }}"
        OMNI_ENDPOINT: https://REDACTED
      register: _new_sa_key
      changed_when: true

    - name: Store github-actions SA key in 1Password
      vars:
        _sa_item:
          title: omni
          category: LOGIN
          fields:
            - id: credential
              label: credential
              type: STRING
              value: "{{ _new_sa_key.stdout | trim | regex_search('OMNI_SERVICE_ACCOUNT_KEY=(.+)', '\\1') | first }}"
      ansible.builtin.shell:
        cmd: op item create --vault github-actions
        stdin: "{{ _sa_item | to_json }}"
      no_log: true
      changed_when: true

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/mgmt-kubeconfig
        - /tmp/omniconfig-bootstrap
