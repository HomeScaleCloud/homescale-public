---
- name: Bootstrap Omni service accounts
  hosts: localhost
  gather_facts: false

  vars:
    omni_endpoint: "{{ lookup('env', 'OMNI_ENDPOINT') | default('https://xxx', true) }}"
    infisical_token: "{{ lookup('env', 'INFISICAL_TOKEN') }}"
    infisical_base_url: https://app.infisical.com
    infisical_project_slug: homescale
    infisical_env_slug: prod

  tasks:
    - name: Skip if SA key already in environment
      ansible.builtin.meta: end_play
      when: lookup('env', 'OMNI_SERVICE_ACCOUNT_KEY') | length > 0

    - name: Check if github-actions SA key exists in Infisical
      ansible.builtin.uri:
        url: >-
          {{ infisical_base_url }}/api/v3/secrets/raw/OMNI_SERVICE_ACCOUNT_KEY
          ?workspaceSlug={{ infisical_project_slug }}
          &environment={{ infisical_env_slug }}
          &secretPath=/github-actions
        headers:
          Authorization: "Bearer {{ infisical_token }}"
        status_code: [200, 404]
      register: _sa_check
      no_log: true

    - name: Skip if SA key already in Infisical
      ansible.builtin.meta: end_play
      when: >
        _sa_check.status == 200 and
        (_sa_check.json.secret.secretValue | default('')) | length > 0

    - name: Fetch mgmt kubeconfig from Infisical
      ansible.builtin.uri:
        url: >-
          {{ infisical_base_url }}/api/v3/secrets/raw/MGMT_KUBECONFIG
          ?workspaceSlug={{ infisical_project_slug }}
          &environment={{ infisical_env_slug }}
          &secretPath=/github-actions
        headers:
          Authorization: "Bearer {{ infisical_token }}"
        status_code: 200
      register: _kubeconfig_resp
      no_log: true
      failed_when: >
        _kubeconfig_resp.status != 200 or
        (_kubeconfig_resp.json.secret.secretValue | default('')) | length == 0

    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ _kubeconfig_resp.json.secret.secretValue }}"
        dest: /tmp/mgmt-kubeconfig
        mode: "0600"
      no_log: true

    - name: Wait for Omni pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _omni_pod_status
      until: >
        _omni_pod_status.resources | length > 0 and
        _omni_pod_status.resources[0].status.phase == 'Running' and
        (_omni_pod_status.resources[0].status.containerStatuses | default([]) |
        selectattr('ready', 'equalto', true) | list | length > 0)
      retries: 30
      delay: 10

    - name: Wait for bootstrap SA key file to appear
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ _omni_pod_status.resources[0].metadata.name }}"
        container: toolbox
        command: test -s /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _key_check
      until: (_key_check.return_code | default(1)) == 0
      retries: 12
      delay: 10
      failed_when: (_key_check.return_code | default(1)) != 0

    - name: Read bootstrap SA key from toolbox sidecar
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ _omni_pod_status.resources[0].metadata.name }}"
        container: toolbox
        command: cat /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _bootstrap_key
      no_log: true

    - name: Create github-actions service account
      ansible.builtin.command:
        cmd: >
          omnictl serviceaccount create github-actions
          --use-user-role=false
          --role Admin
          --ttl 8760h
      environment:
        OMNI_ENDPOINT: "{{ omni_endpoint }}"
        OMNI_SERVICE_ACCOUNT_KEY: "{{ _bootstrap_key.stdout | trim }}"
      register: _new_sa_key
      changed_when: true

    - name: Store github-actions SA key in Infisical
      ansible.builtin.uri:
        url: "{{ infisical_base_url }}/api/v3/secrets/raw/OMNI_SERVICE_ACCOUNT_KEY"
        method: "{{ 'PATCH' if _sa_check.status == 200 else 'POST' }}"
        headers:
          Authorization: "Bearer {{ infisical_token }}"
          Content-Type: application/json
        body_format: json
        body:
          workspaceSlug: "{{ infisical_project_slug }}"
          environment: "{{ infisical_env_slug }}"
          secretPath: /github-actions
          secretValue: >-
            {{ _new_sa_key.stdout | trim
               | regex_search('OMNI_SERVICE_ACCOUNT_KEY=(.+)', '\1')
               | first }}
        status_code: [200, 201]
      no_log: true
      changed_when: true

    - name: Clean up temp kubeconfig
      ansible.builtin.file:
        path: /tmp/mgmt-kubeconfig
        state: absent
