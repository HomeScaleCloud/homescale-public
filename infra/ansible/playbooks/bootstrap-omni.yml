---
- name: Bootstrap Omni service accounts
  hosts: localhost
  gather_facts: false

  vars:
    omni_endpoint: "{{ lookup('env', 'OMNI_ENDPOINT') | default('https://xxx', true) }}"
    infisical_url: https://app.infisical.com
    infisical_project_id: "{{ lookup('env', 'INFISICAL_PROJECT_ID') }}"
    infisical_env_slug: prod

  tasks:
    - name: Skip if SA key already in environment
      ansible.builtin.meta: end_play
      when: lookup('env', 'OMNI_SERVICE_ACCOUNT_KEY') | length > 0

    - name: Login to Infisical
      infisical.vault.login:
        url: "{{ infisical_url }}"
        auth_method: oidc_auth
        identity_id: "{{ lookup('env', 'INFISICAL_IDENTITY_ID') }}"
        jwt: "{{ lookup('env', 'INFISICAL_AUTH_JWT') }}"
      register: _infisical
      no_log: true

    - name: Read OMNI_SERVICE_ACCOUNT_KEY from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ _infisical.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_env_slug }}"
        path: /github-actions
        secret_name: OMNI_SERVICE_ACCOUNT_KEY # pragma: allowlist secret
        as_dict: true
      register: _sa_check
      ignore_errors: true
      no_log: true

    - name: Skip if SA key already in Infisical
      ansible.builtin.meta: end_play
      when: >
        not _sa_check.failed and
        (_sa_check.secrets.OMNI_SERVICE_ACCOUNT_KEY | default('')) | length > 0

    - name: Read MGMT_KUBECONFIG from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ _infisical.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_env_slug }}"
        path: /github-actions
        secret_name: MGMT_KUBECONFIG # pragma: allowlist secret
        as_dict: true
      register: _kubeconfig_resp
      no_log: true
      failed_when: >
        _kubeconfig_resp.failed or
        (_kubeconfig_resp.secrets.MGMT_KUBECONFIG | default('')) | length == 0

    - name: Write kubeconfig to temp file
      ansible.builtin.copy:
        content: "{{ _kubeconfig_resp.secrets.MGMT_KUBECONFIG }}"
        dest: /tmp/mgmt-kubeconfig
        mode: "0600"
      no_log: true

    - name: Wait for Omni pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: omni
        label_selectors:
          - "app.kubernetes.io/name=omni"
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _omni_pod_status
      until: >
        _omni_pod_status.resources | length > 0 and
        _omni_pod_status.resources[0].status.phase == 'Running' and
        (_omni_pod_status.resources[0].status.containerStatuses | default([]) |
        selectattr('ready', 'equalto', true) | list | length > 0)
      retries: 30
      delay: 10

    - name: Wait for bootstrap SA key file to appear
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ _omni_pod_status.resources[0].metadata.name }}"
        container: toolbox
        command: test -s /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _key_check
      until: (_key_check.return_code | default(1)) == 0
      retries: 12
      delay: 10
      failed_when: (_key_check.return_code | default(1)) != 0

    - name: Read bootstrap SA key from toolbox sidecar
      kubernetes.core.k8s_exec:
        namespace: omni
        pod: "{{ _omni_pod_status.resources[0].metadata.name }}"
        container: toolbox
        command: cat /data/initial-sa-key
        kubeconfig: /tmp/mgmt-kubeconfig
      register: _bootstrap_key
      no_log: true

    - name: Create github-actions service account
      ansible.builtin.command:
        cmd: >
          omnictl serviceaccount create github-actions
          --use-user-role=false
          --role Admin
          --ttl 8760h
      environment:
        OMNI_ENDPOINT: "{{ omni_endpoint }}"
        OMNI_SERVICE_ACCOUNT_KEY: "{{ _bootstrap_key.stdout | trim }}"
      register: _new_sa_key
      changed_when: true

    - name: Store github-actions SA key in Infisical
      infisical.vault.create_secret:
        login_data: "{{ _infisical.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_env_slug }}"
        path: /github-actions
        secret_name: OMNI_SERVICE_ACCOUNT_KEY # pragma: allowlist secret
        secret_value: >-
          {{ _new_sa_key.stdout | trim
             | regex_search('OMNI_SERVICE_ACCOUNT_KEY=(.+)', '\1')
             | first }}
      no_log: true
      changed_when: true

    - name: Clean up temp kubeconfig
      ansible.builtin.file:
        path: /tmp/mgmt-kubeconfig
        state: absent
