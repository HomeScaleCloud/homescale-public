---
- name: Bootstrap Omni infra provider service accounts
  hosts: localhost
  gather_facts: false

  vars:
    omni_endpoint: "{{ lookup('env', 'OMNI_ENDPOINT') | default('https://REDACTED', true) }}"
    omni_sa_key: "{{ lookup('env', 'OMNI_SERVICE_ACCOUNT_KEY') }}"
    infisical_url: https://app.infisical.com
    infisical_project_id: "{{ lookup('env', 'INFISICAL_PROJECT_ID') }}"
    infisical_env_slug: prod
    infisical_secret_path: /k8s/omni/infra-providers

  tasks:
    - name: Load omni-infra-provider app config
      ansible.builtin.set_fact:
        _app: >-
          {{
            lookup('file', playbook_dir ~ '/../../../apps/omni-infra-provider/app.yaml')
            | from_yaml
          }}

    - name: Build provider list from enabled clusters
      ansible.builtin.set_fact:
        _providers: >-
          {{
            _app.clusters | dict2items
            | selectattr('value.deploy', 'equalto', true)
            | selectattr('value.values.provider', 'defined')
            | list
          }}

    - name: Login to Infisical
      infisical.vault.login:
        url: "{{ infisical_url }}"
        auth_method: oidc_auth
        identity_id: "{{ lookup('env', 'INFISICAL_IDENTITY_ID') }}"
        jwt: "{{ lookup('env', 'INFISICAL_AUTH_JWT') }}"
      register: _infisical
      no_log: true

    - name: Read existing infra provider keys from Infisical
      infisical.vault.read_secrets:
        login_data: "{{ _infisical.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_env_slug }}"
        path: "{{ infisical_secret_path }}"
        as_dict: true
      register: _existing_keys
      ignore_errors: true
      no_log: true

    - name: Set existing keys dict
      ansible.builtin.set_fact:
        _existing_provider_keys: "{{ _existing_keys.secrets | default({}) }}"

    - name: Creating infra provider
      ansible.builtin.debug:
        msg: "{{ item.key }} ({{ item.value['values']['provider']['region'] }}-{{ item.value['values']['provider']['platform'] }})"
      loop: "{{ _providers }}"
      loop_control:
        label: "{{ item.key }}"
      when: >
        (item.value['values']['provider']['region'] ~ '-' ~ item.value['values']['provider']['platform'])
        not in _existing_provider_keys or
        _existing_provider_keys[item.value['values']['provider']['region'] ~ '-' ~ item.value['values']['provider']['platform']] | length == 0

    - name: Create infra provider
      ansible.builtin.command:
        cmd: >-
          omnictl infraprovider create
          {{ item.value['values']['provider']['region'] }}-{{ item.value['values']['provider']['platform'] }}
      environment:
        OMNI_ENDPOINT: "{{ omni_endpoint }}"
        OMNI_SERVICE_ACCOUNT_KEY: "{{ omni_sa_key }}"
      register: _create_results
      changed_when: _create_results.rc == 0
      failed_when: >
        _create_results.rc != 0 and
        'already exist' not in (_create_results.stderr | lower)
      no_log: true
      loop: "{{ _providers }}"
      loop_control:
        index_var: idx
        label: >-
          {{ item.key }}
          ({{ item.value['values']['provider']['region'] }}-{{ item.value['values']['provider']['platform'] }})
      when: >
        (item.value['values']['provider']['region'] ~ '-' ~ item.value['values']['provider']['platform'])
        not in _existing_provider_keys or
        _existing_provider_keys[item.value['values']['provider']['region'] ~ '-' ~ item.value['values']['provider']['platform']] | length == 0

    - name: Show create result
      ansible.builtin.debug:
        msg: "{{ item.key }}: rc={{ _create_results.results[idx].rc }} stderr={{ _create_results.results[idx].stderr }}"
      loop: "{{ _providers }}"
      loop_control:
        index_var: idx
        label: "{{ item.key }}"
      when: not (_create_results.results[idx].skipped | default(false))

    - name: Store infra provider key in Infisical
      infisical.vault.create_secret:
        login_data: "{{ _infisical.login_data }}"
        project_id: "{{ infisical_project_id }}"
        env_slug: "{{ infisical_env_slug }}"
        path: "{{ infisical_secret_path }}"
        secret_name: >-
          {{ item.value['values']['provider']['region'] }}-{{ item.value['values']['provider']['platform'] }} # pragma: allowlist secret
        secret_value: "{{ _create_results.results[idx].stdout | trim }}" # pragma: allowlist secret
      no_log: true
      changed_when: true
      loop: "{{ _providers }}"
      loop_control:
        index_var: idx
        label: >-
          {{ item.key }}
          ({{ item.value['values']['provider']['region'] }}-{{ item.value['values']['provider']['platform'] }})
      when: >
        not (_create_results.results[idx].skipped | default(false)) and
        _create_results.results[idx].rc == 0
