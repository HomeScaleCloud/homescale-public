---
- name: Bootstrap Omni service accounts
  hosts: localhost
  gather_facts: false

  vars:
    omni_endpoint: "https://REDACTED"
    omni_namespace: omni
    bootstrap_key_path: /data/initial-sa-key
    omniconfig_path: /tmp/omniconfig-bootstrap

  tasks:
    - name: Get Omni pod name
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ omni_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=omni"
      register: omni_pods

    - name: Fail if no Omni pod found
      ansible.builtin.fail:
        msg: "No Omni pod found in namespace {{ omni_namespace }}"
      when: omni_pods.resources | length == 0

    - name: Read bootstrap SA key from pod
      kubernetes.core.k8s_exec:
        namespace: "{{ omni_namespace }}"
        pod: "{{ omni_pods.resources[0].metadata.name }}"
        command: cat {{ bootstrap_key_path }}
      register: bootstrap_key_result
      failed_when: bootstrap_key_result.rc != 0 or bootstrap_key_result.stdout | trim | length == 0

    - name: Generate temporary omniconfig
      ansible.builtin.command:
        cmd: omnictl config new {{ omniconfig_path }} --url {{ omni_endpoint }}
      changed_when: true

    - name: Create github-actions service account
      ansible.builtin.command:
        cmd: >
          omnictl serviceaccount create github-actions
          --use-user-role=false
          --role Admin
          --ttl 8760h
          --omniconfig {{ omniconfig_path }}
      environment:
        OMNI_SERVICE_ACCOUNT_KEY: "{{ bootstrap_key_result.stdout | trim }}"
      register: create_sa_result
      changed_when: true

    - name: Print github-actions SA key
      ansible.builtin.debug:
        msg: |
          === github-actions service account key ===
          {{ create_sa_result.stdout }}
          ==========================================
          Store this in 1Password (vaults/k8s/items/omni) as 'github-actions-sa-key'

    - name: Clean up temporary omniconfig
      ansible.builtin.file:
        path: "{{ omniconfig_path }}"
        state: absent
