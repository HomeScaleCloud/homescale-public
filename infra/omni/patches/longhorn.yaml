machine:
  install:
    extensions:
      - image: ghcr.io/siderolabs/iscsi-tools:v0.1.6
      - image: ghcr.io/siderolabs/util-linux-tools:v2.40.2
  kubelet:
    extraMounts:
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw
  volumes:
    - name: longhorn
      provisioning:
        diskSelector:
          match: 'disk.size >= 900000000000 && !system_disk'
      filesystem:
        type: xfs
      mount:
        point: /var/mnt/longhorn
