name: "Build"
permissions:
  contents: read
  packages: write
  id-token: write


on:
  workflow_call:
    secrets:
      INFISICAL_GH_IDENTITY_ID:
        required: false
  workflow_dispatch:

jobs:
  discover:
    name: "Discover build targets"
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.set.outputs.docker }}
      helm: ${{ steps.set.outputs.helm }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Find Docker & Helm targets
        id: set
        shell: bash
        run: |
          set -euo pipefail
          # Find Dockerfiles under apps/** (supports apps/foo/src/Dockerfile or apps/foo/Dockerfile)
          docker_json='[]'
          while IFS= read -r df; do
            dir="$(dirname "$df")"
            base="$(basename "$dir")"
            if [[ "$base" == "src" ]]; then
              name="$(basename "$(dirname "$dir")")"
              context="$dir"
            else
              name="$(basename "$dir")"
              context="$dir"
            fi
            docker_json="$(jq --arg n "$name" --arg c "$context" '. + [{name:$n, context:$c}]' <<<"$docker_json")"
          done < <(find apps -type f -iname Dockerfile | sort)

          # Find Helm charts as any apps/*/Chart.yaml (and apps/*/charts/<subchart>/Chart.yaml ignored)
          helm_json='[]'
          while IFS= read -r chart; do
            chart_dir="$(dirname "$chart")"
            # app name is the directory containing Chart.yaml
            name="$(basename "$chart_dir")"
            helm_json="$(jq --arg n "$name" --arg p "$chart_dir" '. + [{name:$n, path:$p}]' <<<"$helm_json")"
          done < <(find apps -maxdepth 2 -type f -name Chart.yaml | sort)

          event="${GITHUB_EVENT_NAME}"
          is_pr="false"
          if [[ "$event" == "pull_request" || "$event" == "pull_request_target" || "${GITHUB_REF}" == refs/pull/* ]]; then
            is_pr="true"
          fi

          if [[ "$is_pr" == "true" ]]; then
            if [[ -z "${GITHUB_BASE_REF:-}" ]]; then
              echo "No base ref available; building all discovered apps."
            else
              git fetch --no-tags origin "${GITHUB_BASE_REF}" --depth=1
              mapfile -t changed_files < <(git diff --name-only "origin/${GITHUB_BASE_REF}" HEAD || true)
              mapfile -t changed_apps < <(printf '%s\n' "${changed_files[@]}" | awk -F/ '($1=="apps" && $2!=""){print $2}' | sort -u)

              if (( ${#changed_apps[@]} )); then
                echo "Changed apps detected: ${changed_apps[*]}"
                apps_json="$(printf '%s\n' "${changed_apps[@]}" | jq -R . | jq -s 'map(select(length>0))')"
                docker_json="$(jq --argjson apps "$apps_json" 'map(select(.name as $n | ($apps | index($n))))' <<<"$docker_json")"
                helm_json="$(jq --argjson apps "$apps_json" 'map(select(.name as $n | ($apps | index($n))))' <<<"$helm_json")"
              else
                echo "No app changes detected on PR; skipping Docker and Helm builds."
                docker_json='[]'
                helm_json='[]'
              fi
            fi
          else
            echo "Non-PR event; building all discovered apps."
          fi

          echo "docker=$(jq -c . <<<"$docker_json")" >> "$GITHUB_OUTPUT"
          echo "helm=$(jq -c . <<<"$helm_json")" >> "$GITHUB_OUTPUT"

  docker:
    name: "Docker - ${{ matrix.name }}"
    needs: [discover]
    if: needs.discover.outputs.docker != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.docker) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Import Secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env

      - name: Setup NetBird client
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"

      - name: Connect to NetBird
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"

      - name: Login to ghcr (Docker)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/homescalecloud/${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          network: host

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/homescalecloud/${{ matrix.name }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "${NB_SETUP_KEY_ID:-}" ] || [ "${NB_SETUP_KEY_ID}" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
