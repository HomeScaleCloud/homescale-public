name: "Scan"
permissions:
  actions: read
  packages: read
  contents: read
  id-token: write

on:
  workflow_call:
    inputs:
      pr_title:
        type: string
        default: ''
    secrets:
      INFISICAL_GH_IDENTITY_ID:
        required: false
  workflow_dispatch:

jobs:
  prlint:
    name: "PR Lint"
    if: inputs.pr_title != ''
    runs-on: ubuntu-latest
    steps:
      - name: "Validate PR title"
        env:
          TITLE: ${{ inputs.pr_title }}
        run: |
          pattern='^(feat|fix|chore|refactor|docs|style|test|perf|ci|build|revert)(\([a-z0-9/_-]+\))?(!)?: .+$'
          if ! echo "$TITLE" | grep -qE "$pattern"; then
            echo "PR title must follow Conventional Commits format: type(scope): description"
            echo "Types: feat fix chore refactor docs style test perf ci build revert"
            echo "Got: $TITLE"
            exit 1
          fi

  pre-commit:
    name: "pre-commit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
      - uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43  # v1.1.0
        if: always()


  trivy:
    name: Trivy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'config'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
          skip-version-check: true
