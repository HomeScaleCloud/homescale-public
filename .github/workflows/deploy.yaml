name: "Deploy"
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
    secrets:
      op_service_account_token:
        required: true

concurrency:
  group: deploy

jobs:
  tailscale:
    name: "Tailscale"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 'stable'

      - name: Setup ACL combiner
        run: |
          go install github.com/tailscale-dev/tailscale-acl-combiner@latest

      - name: Build ACL
        run: |
          mkdir -p .tmp/infra/tailscale
          cp infra/tailscale/*.hujson .tmp/infra/tailscale/
          rm -f .tmp/infra/tailscale/base.hujson
          find apps -type f -name tailscale.hujson -print0 | while IFS= read -r -d '' file; do
            rel="${file#apps/}"
            safe="${rel//\//__}"
            cp "$file" ".tmp/infra/tailscale/apps__${safe%.hujson}.hujson"
          done

          tailscale-acl-combiner \
            -f "infra/tailscale/base.hujson" \
            -d ".tmp/infra/tailscale" \
            -allow grants,tagOwners,ssh,autoApprovers,nodeAttrs \
            > "infra/tailscale/combined.hujson"

      - name: Export ACL
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tailscale-acl
          path: infra/tailscale/combined.hujson
          retention-days: 11

      - name: Import Secrets
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}
          TS_TAILNET: op://github-actions/tailscale-tailnet/username
          TS_ID: op://github-actions/tailscale/username
          TS_SECRET: op://github-actions/tailscale/password  # pragma: allowlist secret

      - name: Sync ACL
        uses: tailscale/gitops-acl-action@v1
        with:
          tailnet: tempel-carp.ts.net
          oauth-client-id: ${{ env.TS_ID }}
          oauth-secret: ${{ env.TS_SECRET }}
          policy-file: infra/tailscale/combined.hujson
          action: ${{ github.event_name == 'pull_request' && 'test' || 'apply' }}

  terraform:
    name: "Terraform"
    needs: tailscale
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'terraform' || null }}
    defaults:
      run:
        shell: bash
        working-directory: ./infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_op_service_account_token: ${{ secrets.op_service_account_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Import Secrets
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}
          TF_TOKEN_app_terraform_io: op://github-actions/terraform-cloud/credential
          TS_ID: op://github-actions/tailscale/username
          TS_SECRET: op://github-actions/tailscale/password  # pragma: allowlist secret
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - name: Initialize Terraform
        id: init
        run: terraform init
      - name: Validate
        id: validate
        run: terraform validate
      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade #v3
        with:
          oauth-client-id: $TS_ID
          oauth-secret: $TS_SECRET
          tags: tag:github-actions
      - name: Plan
        id: plan
        run: terraform plan -out=tfplan
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
