name: "Deploy"
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
    secrets:
      op_service_account_token:
        required: true

concurrency:
  group: deploy

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'terraform' || null }}
    defaults:
      run:
        shell: bash
        working-directory: ./infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_op_service_account_token: ${{ secrets.op_service_account_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Import Secrets
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}
          TF_TOKEN_app_terraform_io: op://github-actions/terraform-cloud/credential
          TG_SERVICE_KEY: op://github-actions/twingate-service-key/password  # pragma: allowlist secret
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
      - name: Initialize Terraform
        id: init
        run: terraform init
      - name: Validate
        id: validate
        run: terraform validate
      - name: Connect to Twingate
        uses: twingate/github-action@f1e69fc5af67b737d8597b759e5c607f567e77f2 # v1.8
        with:
          service-key: ${{ env.TG_SERVICE_KEY }}
          cache: true
      - name: Plan
        id: plan
        run: terraform plan -out=tfplan
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

