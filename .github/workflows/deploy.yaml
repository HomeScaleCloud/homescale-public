name: "Deploy"
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
    secrets:
      INFISICAL_GH_IDENTITY_ID:
        required: true
      INFISICAL_ORG_ID:
        required: true
      INFISICAL_PROJECT_ID:
        required: true
  workflow_dispatch:

concurrency:
  group: deploy

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'terraform' || null }}
    defaults:
      run:
        shell: bash
        working-directory: ./infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_infisical_github_actions: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
      TF_VAR_infisical_org_id: ${{ secrets.INFISICAL_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Import Secrets
        id: infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4
      - name: Request OIDC Token
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_AUTH_JWT=$TOKEN" >> "$GITHUB_ENV"
      - name: Initialize Terraform
        id: init
        run: terraform init
      - name: Validate
        id: validate
        run: terraform validate
      - name: Setup NetBird client
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh
      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi
          echo "Found GitHub Actions group"

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "Setup key generated"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"
      - name: Connect to NetBird
        run: |
          netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
          sleep 10
      - name: Plan
        id: plan
        continue-on-error: true
        run: |
          if terraform plan -no-color -out=tfplan > /tmp/tf-plan-full.txt 2>&1; then
            terraform show -no-color tfplan > /tmp/tf-plan.txt
            echo "PLAN_STATUS=success" >> "$GITHUB_ENV"
          else
            cp /tmp/tf-plan-full.txt /tmp/tf-plan.txt
            echo "PLAN_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi
        env:
          TF_VAR_netbird_token: ${{ env.NETBIRD_SA_TOKEN }}
      - name: Write plan to job summary
        if: always() && steps.plan.outcome != 'skipped'
        run: |
          icon=$([[ "${PLAN_STATUS:-}" == "success" ]] && echo "✅" || echo "❌")
          {
            echo "## ${icon} Terraform Plan"
            echo ""
            echo '```'
            cat /tmp/tf-plan.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "> commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Post plan results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fs = require('fs');

            async function upsertComment(marker, body) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

            const ok = process.env.PLAN_STATUS === 'success';
            const output = fs.existsSync('/tmp/tf-plan.txt')
              ? fs.readFileSync('/tmp/tf-plan.txt', 'utf8').trim()
              : '(no output)';
            const icon = ok ? '✅' : '❌';
            const marker = '<!-- terraform-plan -->';
            const body = [
              marker,
              `## ${icon} Terraform Plan`,
              '',
              '```',
              output || '(no output)',
              '```',
              '',
              `> commit \`${{ github.sha }}\``,
            ].join('\n');
            await upsertComment(marker, body);
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Terraform plan failed. See job summary for details."
          exit 1
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_netbird_token: ${{ env.NETBIRD_SA_TOKEN }}
      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "$NB_SETUP_KEY_ID" ] || [ "$NB_SETUP_KEY_ID" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"

  omni:
    name: "Omni"
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed clusters
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            range="origin/${{ github.base_ref }}...${{ github.sha }}"
            clusters=$(
              git diff --name-only --diff-filter=d "$range" \
                | { grep -E '^clusters/[^/]+/cluster\.yaml$' || true; } \
                | cut -d/ -f2 \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
            machineclasses=$(
              git diff --name-only --diff-filter=d "$range" \
                | { grep -E '^infra/omni/machineclasses/[^/]+\.yaml$' || true; } \
                | sed 's|.*/||; s|\.yaml$||' \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
            deleted_clusters=$(
              git diff --name-only --diff-filter=D "$range" \
                | { grep -E '^clusters/[^/]+/cluster\.yaml$' || true; } \
                | cut -d/ -f2 \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
            deleted_machineclasses=$(
              git diff --name-only --diff-filter=D "$range" \
                | { grep -E '^infra/omni/machineclasses/[^/]+\.yaml$' || true; } \
                | sed 's|.*/||; s|\.yaml$||' \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
          else
            clusters=$(
              find clusters -mindepth 2 -maxdepth 2 -name 'cluster.yaml' \
                | cut -d/ -f2 \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
            machineclasses=$(
              { if [ -d infra/omni/machineclasses ]; then find infra/omni/machineclasses -maxdepth 1 -name '*.yaml'; fi; } \
                | sed 's|.*/||; s|\.yaml$||' \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
            deleted_clusters='[]'
            deleted_machineclasses='[]'
          fi
          echo "clusters=${clusters}" >> "$GITHUB_OUTPUT"
          echo "CLUSTERS=${clusters}" >> "$GITHUB_ENV"
          echo "Clusters detected: ${clusters}"
          echo "machineclasses=${machineclasses}" >> "$GITHUB_OUTPUT"
          echo "MACHINECLASSES=${machineclasses}" >> "$GITHUB_ENV"
          echo "Machine classes detected: ${machineclasses}"
          echo "deleted_clusters=${deleted_clusters}" >> "$GITHUB_OUTPUT"
          echo "Deleted clusters detected: ${deleted_clusters}"
          echo "deleted_machineclasses=${deleted_machineclasses}" >> "$GITHUB_OUTPUT"
          echo "Deleted machine classes detected: ${deleted_machineclasses}"

      - name: Import Secrets
        if: steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]'
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env

      - name: Setup NetBird client
        if: steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]'
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Generate NetBird Setup Key
        if: steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]'
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"

      - name: Connect to NetBird
        if: steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]'
        run: |
          netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
          sleep 10

      - name: Check Omni reachability
        id: omni_check
        if: steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]'
        run: |
          if curl -sf --max-time 10 https://REDACTED/healthz > /dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "Omni unreachable — skipping sync"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install omnictl
        if: (steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]') && steps.omni_check.outputs.reachable != 'false'
        run: |
          curl -fsSL -o /usr/local/bin/omnictl \
            https://REDACTED/api/omnictl/omnictl-linux-amd64
          chmod +x /usr/local/bin/omnictl
          sudo apt-get install -y yq

      - name: Plan
        if: (steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]') && steps.omni_check.outputs.reachable != 'false' && github.event_name == 'pull_request'
        id: plan
        continue-on-error: true
        env:
          OMNI_ENDPOINT: https://REDACTED
          OMNI_SERVICE_ACCOUNT_KEY: ${{ env.OMNI_SERVICE_ACCOUNT_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          failed=false
          for mc in $(echo "$MACHINECLASSES" | jq -r '.[]'); do
            echo "Planning machine class: $mc"
            if omnictl apply -f "infra/omni/machineclasses/$mc.yaml" \
                --dry-run \
                > "/tmp/omni-mc-$mc.txt" 2>&1; then
              echo "PLAN_MC_${mc}=success" >> "$GITHUB_ENV"
            else
              echo "PLAN_MC_${mc}=failed" >> "$GITHUB_ENV"
              failed=true
            fi
          done
          for cluster in $(echo "$CLUSTERS" | jq -r '.[]'); do
            echo "Planning cluster: $cluster"
            tmpdir=$(mktemp -d)
            CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "clusters/$cluster/cluster.yaml" \
              > "$tmpdir/cluster.yaml"
            mkdir -p "$tmpdir/patches"
            for pf in infra/omni/patches/*.yaml; do
              CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "$pf" > "$tmpdir/patches/$(basename "$pf")"
            done
            if omnictl cluster template sync \
                -f "$tmpdir/cluster.yaml" \
                --dry-run \
                > "/tmp/omni-$cluster.txt" 2>&1; then
              echo "PLAN_${cluster}=success" >> "$GITHUB_ENV"
            else
              echo "PLAN_${cluster}=failed" >> "$GITHUB_ENV"
              failed=true
            fi
            rm -rf "$tmpdir"
          done
          [ "$failed" = "false" ]

      - name: Sync
        if: (steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]') && steps.omni_check.outputs.reachable != 'false' && github.ref == 'refs/heads/main'
        env:
          OMNI_ENDPOINT: https://REDACTED
          OMNI_SERVICE_ACCOUNT_KEY: ${{ env.OMNI_SERVICE_ACCOUNT_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for mc in $(echo "$MACHINECLASSES" | jq -r '.[]'); do
            echo "Applying machine class: $mc"
            omnictl apply -f "infra/omni/machineclasses/$mc.yaml"
          done
          for cluster in $(echo "$CLUSTERS" | jq -r '.[]'); do
            echo "Syncing cluster: $cluster"
            tmpdir=$(mktemp -d)
            CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "clusters/$cluster/cluster.yaml" \
              > "$tmpdir/cluster.yaml"
            mkdir -p "$tmpdir/patches"
            for pf in infra/omni/patches/*.yaml; do
              CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "$pf" > "$tmpdir/patches/$(basename "$pf")"
            done
            omnictl cluster template sync -f "$tmpdir/cluster.yaml"
            rm -rf "$tmpdir"
          done

      - name: Post plan results as PR comments
        if: always() && github.event_name == 'pull_request' && (steps.detect.outputs.clusters != '[]' || steps.detect.outputs.machineclasses != '[]' || steps.detect.outputs.deleted_clusters != '[]' || steps.detect.outputs.deleted_machineclasses != '[]') && steps.omni_check.outputs.reachable != 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        env:
          CLUSTERS: ${{ steps.detect.outputs.clusters }}
          MACHINECLASSES: ${{ steps.detect.outputs.machineclasses }}
          DELETED_CLUSTERS: ${{ steps.detect.outputs.deleted_clusters }}
          DELETED_MACHINECLASSES: ${{ steps.detect.outputs.deleted_machineclasses }}
        with:
          script: |
            const fs = require('fs');

            async function upsertComment(marker, body) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

            const clusters = JSON.parse(process.env.CLUSTERS);
            for (const cluster of clusters) {
              const ok = process.env[`PLAN_${cluster}`] === 'success';
              const output = fs.existsSync(`/tmp/omni-${cluster}.txt`)
                ? fs.readFileSync(`/tmp/omni-${cluster}.txt`, 'utf8').trim()
                : '(no output)';
              const icon = ok ? '✅' : '❌';
              const marker = `<!-- omni-cluster-sync-${cluster} -->`;
              const body = [
                marker,
                `## ${icon} Omni cluster template plan — \`${cluster}\``,
                '',
                '```',
                output || '(no output)',
                '```',
                '',
                `> commit \`${{ github.sha }}\``,
              ].join('\n');
              await upsertComment(marker, body);
            }

            const machineclasses = JSON.parse(process.env.MACHINECLASSES);
            for (const mc of machineclasses) {
              const ok = process.env[`PLAN_MC_${mc}`] === 'success';
              const output = fs.existsSync(`/tmp/omni-mc-${mc}.txt`)
                ? fs.readFileSync(`/tmp/omni-mc-${mc}.txt`, 'utf8').trim()
                : '(no output)';
              const icon = ok ? '✅' : '❌';
              const marker = `<!-- omni-machineclass-${mc} -->`;
              const body = [
                marker,
                `## ${icon} Omni machine class plan — \`${mc}\``,
                '',
                '```',
                output || '(no output)',
                '```',
                '',
                `> commit \`${{ github.sha }}\``,
              ].join('\n');
              await upsertComment(marker, body);
            }

            const deletedClusters = JSON.parse(process.env.DELETED_CLUSTERS);
            for (const cluster of deletedClusters) {
              const marker = `<!-- omni-cluster-sync-${cluster} -->`;
              const body = [
                marker,
                `## 🗑️ Omni cluster template plan — \`${cluster}\` (removed)`,
                '',
                `\`clusters/${cluster}/cluster.yaml\` was removed in this PR, so no automated sync will run for it. If the cluster still exists in Omni, it must be torn down manually.`,
                '',
                `> commit \`${{ github.sha }}\``,
              ].join('\n');
              await upsertComment(marker, body);
            }

            const deletedMachineclasses = JSON.parse(process.env.DELETED_MACHINECLASSES);
            for (const mc of deletedMachineclasses) {
              const marker = `<!-- omni-machineclass-${mc} -->`;
              const body = [
                marker,
                `## 🗑️ Omni machine class plan — \`${mc}\` (removed)`,
                '',
                `\`infra/omni/machineclasses/${mc}.yaml\` was removed in this PR, so no automated sync will run for it. Remove it manually in Omni if it still exists.`,
                '',
                `> commit \`${{ github.sha }}\``,
              ].join('\n');
              await upsertComment(marker, body);
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "One or more cluster template plans failed. See PR comments for details."
          exit 1

      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "${NB_SETUP_KEY_ID:-}" ] || [ "${NB_SETUP_KEY_ID}" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"

  ansible:
    name: "Ansible"
    runs-on: ubuntu-latest
    needs: omni
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Import Secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env

      - name: Setup NetBird client
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"

      - name: Connect to NetBird
        run: |
          netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
          sleep 10

      - name: Request OIDC Token
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "INFISICAL_AUTH_JWT=$TOKEN" >> "$GITHUB_ENV"

      - name: Install hsctl
        run: |
          chmod +x hsctl
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Ansible
        run: pip install ansible kubernetes infisicalsdk==1.0.16

      - name: Install Ansible collections
        working-directory: infra/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run mgmt cluster bootstrap playbook
        working-directory: infra/ansible
        env:
          INFISICAL_IDENTITY_ID: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: ansible-playbook playbooks/bootstrap-mgmt.yml -e cluster_name=mgmt

      - name: Install omnictl
        run: |
          curl -fsSL -o /usr/local/bin/omnictl \
            https://REDACTED/api/omnictl/omnictl-linux-amd64
          chmod +x /usr/local/bin/omnictl

      - name: Run cluster bootstrap playbook
        working-directory: infra/ansible
        env:
          OMNI_ENDPOINT: https://REDACTED
          OMNI_SERVICE_ACCOUNT_KEY: ${{ env.OMNI_SERVICE_ACCOUNT_KEY }}
          INFISICAL_IDENTITY_ID: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: ansible-playbook playbooks/bootstrap-cluster.yml

      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "${NB_SETUP_KEY_ID:-}" ] || [ "${NB_SETUP_KEY_ID}" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
