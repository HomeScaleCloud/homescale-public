name: "Deploy"
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'terraform' || null }}
    defaults:
      run:
        shell: bash
        working-directory: ./infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_infisical_github_actions: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
      TF_VAR_infisical_org_id: ${{ secrets.INFISICAL_ORG_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Import Secrets
        id: infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "production"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - name: Initialize Terraform
        id: init
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ env.TERRAFORM_CLOUD_TOKEN }}
      - name: Validate
        id: validate
        run: terraform validate
      - name: Setup NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NB_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi
          echo "Found GitHub Actions group"

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NB_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "Setup key generated"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"
      - name: Connect to NetBird
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
      - name: Plan
        id: plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ env.CLOUDFLARE_ZONE_ID }}
          TF_VAR_digitalocean_token: ${{ env.DIGITALOCEAN_TOKEN }}
          TF_VAR_netbird_token: ${{ env.NB_SA_TOKEN }}
          TF_VAR_argocd_deploy_key: ${{ env.ARGOCD_DEPLOY_KEY }}
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ env.CLOUDFLARE_ZONE_ID }}
          TF_VAR_digitalocean_token: ${{ env.DIGITALOCEAN_TOKEN }}
          TF_VAR_netbird_token: ${{ env.NB_SA_TOKEN }}
          TF_VAR_argocd_deploy_key: ${{ env.ARGOCD_DEPLOY_KEY }}
      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "$NB_SETUP_KEY_ID" ] || [ "$NB_SETUP_KEY_ID" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NB_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"

  omni:
    name: "Omni"
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed clusters
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            range="origin/${{ github.base_ref }}...${{ github.sha }}"
            clusters=$(
              git diff --name-only "$range" \
                | { grep -E '^clusters/[^/]+/cluster\.yaml$' || true; } \
                | cut -d/ -f2 \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
          else
            clusters=$(
              find clusters -mindepth 2 -maxdepth 2 -name 'cluster.yaml' \
                | cut -d/ -f2 \
                | sort -u \
                | jq -Rsc 'split("\n") | map(select(length > 0))'
            )
          fi
          echo "clusters=${clusters}" >> "$GITHUB_OUTPUT"
          echo "CLUSTERS=${clusters}" >> "$GITHUB_ENV"
          echo "Clusters detected: ${clusters}"

      - name: Import Secrets
        if: steps.detect.outputs.clusters != '[]'
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "production"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env

      - name: Setup NetBird
        if: steps.detect.outputs.clusters != '[]'
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Generate NetBird Setup Key
        if: steps.detect.outputs.clusters != '[]'
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NB_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NB_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"

      - name: Connect to NetBird
        if: steps.detect.outputs.clusters != '[]'
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"

      - name: Install omnictl
        if: steps.detect.outputs.clusters != '[]'
        run: |
          curl -fsSL -o /usr/local/bin/omnictl \
            https://github.com/siderolabs/omni/releases/download/v1.8.2/omnictl-linux-amd64
          chmod +x /usr/local/bin/omnictl

      - name: Plan
        if: steps.detect.outputs.clusters != '[]' && github.event_name == 'pull_request'
        id: plan
        continue-on-error: true
        env:
          OMNI_ENDPOINT: https://xxx
          OMNI_SERVICE_ACCOUNT_KEY: ${{ env.OMNI_SERVICE_ACCOUNT_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local n=1 output
            while true; do
              if output=$("$@" 2>&1); then
                printf '%s\n' "$output"
                return 0
              fi
              printf '%s\n' "$output"
              if [ $n -ge 3 ]; then return 1; fi
              if ! printf '%s\n' "$output" | grep -q "Error: rpc error"; then return 1; fi
              echo "Attempt $n/3 failed with RPC error, retrying in 5s..."
              n=$((n+1))
              sleep 5
            done
          }
          failed=false
          for cluster in $(echo "$CLUSTERS" | jq -r '.[]'); do
            echo "Planning cluster: $cluster"
            tmpdir=$(mktemp -d)
            CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "clusters/$cluster/cluster.yaml" > "$tmpdir/cluster.yaml"
            mkdir -p "$tmpdir/patches"
            for pf in clusters/patches/*.yaml; do
              CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "$pf" > "$tmpdir/patches/$(basename "$pf")"
            done
            if retry omnictl cluster template sync \
                -f "$tmpdir/cluster.yaml" \
                --dry-run \
                > "/tmp/omni-$cluster.txt" 2>&1; then
              echo "PLAN_${cluster}=success" >> "$GITHUB_ENV"
            else
              echo "PLAN_${cluster}=failed" >> "$GITHUB_ENV"
              failed=true
            fi
            rm -rf "$tmpdir"
          done
          [ "$failed" = "false" ]

      - name: Sync
        if: steps.detect.outputs.clusters != '[]' && github.ref == 'refs/heads/main'
        env:
          OMNI_ENDPOINT: https://xxx
          OMNI_SERVICE_ACCOUNT_KEY: ${{ env.OMNI_SERVICE_ACCOUNT_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local n=1 output
            while true; do
              if output=$("$@" 2>&1); then
                printf '%s\n' "$output"
                return 0
              fi
              printf '%s\n' "$output"
              if [ $n -ge 3 ]; then return 1; fi
              if ! printf '%s\n' "$output" | grep -q "Error: rpc error"; then return 1; fi
              echo "Attempt $n/3 failed with RPC error, retrying in 5s..."
              n=$((n+1))
              sleep 5
            done
          }
          for cluster in $(echo "$CLUSTERS" | jq -r '.[]'); do
            echo "Syncing cluster: $cluster"
            tmpdir=$(mktemp -d)
            CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "clusters/$cluster/cluster.yaml" > "$tmpdir/cluster.yaml"
            mkdir -p "$tmpdir/patches"
            for pf in clusters/patches/*.yaml; do
              CLUSTER_NAME="$cluster" envsubst '${CLUSTER_NAME}' < "$pf" > "$tmpdir/patches/$(basename "$pf")"
            done
            retry omnictl cluster template sync -f "$tmpdir/cluster.yaml"
            rm -rf "$tmpdir"
          done

      - name: Post plan results as PR comments
        if: always() && github.event_name == 'pull_request' && steps.detect.outputs.clusters != '[]'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          CLUSTERS: ${{ steps.detect.outputs.clusters }}
        with:
          script: |
            const fs = require('fs');
            const clusters = JSON.parse(process.env.CLUSTERS);
            for (const cluster of clusters) {
              const ok = process.env[`PLAN_${cluster}`] === 'success';
              const output = fs.existsSync(`/tmp/omni-${cluster}.txt`)
                ? fs.readFileSync(`/tmp/omni-${cluster}.txt`, 'utf8').trim()
                : '(no output)';
              const icon = ok ? '✅' : '❌';
              const marker = `<!-- omni-cluster-sync-${cluster} -->`;
              const body = [
                marker,
                `## ${icon} Omni cluster template plan — \`${cluster}\``,
                '',
                '```',
                output || '(no output)',
                '```',
                '',
                `> commit \`${{ github.sha }}\``,
              ].join('\n');
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "One or more cluster template plans failed. See PR comments for details."
          exit 1

      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "${NB_SETUP_KEY_ID:-}" ] || [ "${NB_SETUP_KEY_ID}" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NB_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
