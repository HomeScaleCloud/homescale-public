name: "Deploy"
permissions:
  contents: read
  id-token: write
  pull-requests: write

on:
  workflow_call:
    secrets:
      op_service_account_token:
        required: true

concurrency:
  group: deploy

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'terraform' || null }}
    defaults:
      run:
        shell: bash
        working-directory: ./infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_op_service_account_token: ${{ secrets.op_service_account_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Import Secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}
          TF_TOKEN_app_terraform_io: op://github-actions/terraform-cloud/credential
          NB_SA_TOKEN: op://github-actions/netbird/credential  # pragma: allowlist secret
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - name: Initialize Terraform
        id: init
        run: terraform init
      - name: Validate
        id: validate
        run: terraform validate
      - name: Setup NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NB_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi
          echo "Found GitHub Actions group"

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NB_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "Setup key generated"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"
      - name: Connect to NetBird
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "$NB_SETUP_KEY_ID" ] || [ "$NB_SETUP_KEY_ID" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NB_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
      - name: Plan
        id: plan
        run: terraform plan -out=tfplan
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  omni-bootstrap:
    name: "Omni Bootstrap"
    runs-on: ubuntu-latest
    needs: [terraform]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Import Secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}
          NB_SA_TOKEN: op://github-actions/netbird/credential # pragma: allowlist secret
      - name: Setup NetBird
        run: |
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NB_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NB_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"
      - name: Connect to NetBird
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "$NB_SETUP_KEY_ID" ] || [ "$NB_SETUP_KEY_ID" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NB_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
      - name: Install omnictl
        run: |
          curl -fsSL -o /usr/local/bin/omnictl \
            https://github.com/siderolabs/omni/releases/download/v1.8.2/omnictl-linux-amd64
          chmod +x /usr/local/bin/omnictl
      - name: Install Ansible and dependencies
        run: |
          pip install --quiet ansible
          ansible-galaxy collection install kubernetes.core
      - name: Run bootstrap playbook
        run: ansible-playbook infra/ansible/bootstrap-omni.yml
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.op_service_account_token }}

