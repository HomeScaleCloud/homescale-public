name: Public Mirror

on:
  workflow_call:
    secrets:
      PUBLIC_DEPLOY_KEY:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Rewrite history — scrub internal FQDNs
        run: |
          # Any FQDN ending in REDACTED → xxx, across every blob in every commit
          printf 'regex:([a-zA-Z0-9*._-]+\\.)?homescale\\.cloud==>xxx\n' > /tmp/replacements.txt
          # --force: needed because we didn't clone from an empty repo
          git filter-repo --replace-text /tmp/replacements.txt --force

      - name: Push to public mirror
        env:
          GIT_SSH_KEY: ${{ secrets.PUBLIC_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GIT_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          # filter-repo removes origin as a safety measure; add the public remote fresh
          git remote add public git@github.com:HomeScaleCloud/homescale-public.git
          git push public main --force
