name: "CI"
permissions:
  actions: read
  contents: read
  packages: write
  id-token: write
  issues: write
  pull-requests: write
  security-events: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    uses: ./.github/workflows/scan.yaml
    with:
      pr_title: ${{ github.event.pull_request.title }}
    secrets:
      INFISICAL_GH_IDENTITY_ID: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}

  build:
    uses: ./.github/workflows/build.yaml

  deploy:
    uses: ./.github/workflows/deploy.yaml
    needs: [build, scan]
    secrets:
      INFISICAL_GH_IDENTITY_ID: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
      INFISICAL_ORG_ID: ${{ secrets.INFISICAL_ORG_ID }}
