name: "Omni Bootstrap"
permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: "Bootstrap"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homescalecloud/actions-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --cap-add NET_ADMIN --device /dev/net/tun
    defaults:
      run:
        shell: bash
        working-directory: infra/ansible
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Import Secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_GH_IDENTITY_ID }}
          env-slug: "prod"
          project-slug: "homescale"
          secret-path: "/github-actions"
          export-type: env
      - name: Generate NetBird Setup Key
        run: |
          NB_GROUP_ID=$(curl -fsSL \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            https://api.netbird.io/api/groups \
            | jq -r '.[] | select(.name == "GitHub Actions") | .id')

          if [ -z "$NB_GROUP_ID" ] || [ "$NB_GROUP_ID" = "null" ]; then
            echo "Failed to find GitHub Actions group" && exit 1
          fi

          NB_KEY_RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.netbird.io/api/setup-keys \
            -d "{\"name\":\"github-actions-${GITHUB_RUN_ID}\",\"type\":\"one-off\",\"expires_in\":900,\"revokable\":true,\"ephemeral\":true,\"auto_groups\":[\"$NB_GROUP_ID\"]}")

          NB_SETUP_KEY=$(echo "$NB_KEY_RESPONSE" | jq -r '.key')
          NB_SETUP_KEY_ID=$(echo "$NB_KEY_RESPONSE" | jq -r '.id')

          if [ -z "$NB_SETUP_KEY" ] || [ "$NB_SETUP_KEY" = "null" ]; then
            echo "Failed to generate NetBird setup key" && exit 1
          fi
          echo "::add-mask::$NB_SETUP_KEY"
          echo "NB_SETUP_KEY=$NB_SETUP_KEY" >> "$GITHUB_ENV"
          echo "NB_SETUP_KEY_ID=$NB_SETUP_KEY_ID" >> "$GITHUB_ENV"
      - name: Connect to NetBird
        run: netbird up --setup-key "$NB_SETUP_KEY" --hostname "github-actions-${GITHUB_RUN_ID}"
      - name: Install Ansible
        run: pip install --quiet ansible
      - name: Install collections
        run: ansible-galaxy collection install -r collections/requirements.yml
      - name: Get Infisical write token via OIDC
        id: infisical_token
        run: |
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fapp.infisical.com" \
            | jq -r '.value')
          INFISICAL_ACCESS_TOKEN=$(curl -fsSL -X POST \
            "https://app.infisical.com/api/v1/auth/oidc-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identityId\": \"${{ secrets.INFISICAL_GH_IDENTITY_ID }}\", \"jwt\": \"$OIDC_TOKEN\"}" \
            | jq -r '.accessToken')
          echo "::add-mask::$INFISICAL_ACCESS_TOKEN"
          echo "INFISICAL_ACCESS_TOKEN=$INFISICAL_ACCESS_TOKEN" >> "$GITHUB_ENV"
          INFISICAL_PROJECT_ID=$(curl -fsSL \
            -H "Authorization: Bearer $INFISICAL_ACCESS_TOKEN" \
            "https://app.infisical.com/api/v1/workspaces" \
            | jq -r '.workspaces[] | select(.slug == "homescale") | .id')
          echo "project_id=$INFISICAL_PROJECT_ID" >> "$GITHUB_OUTPUT"
      - name: Run playbook
        run: ansible-playbook playbooks/omni-bootstrap.yml
        env:
          INFISICAL_WORKSPACE_ID: ${{ steps.infisical_token.outputs.project_id }}
          INFISICAL_ACCESS_TOKEN: ${{ env.INFISICAL_ACCESS_TOKEN }}
      - name: Revoke NetBird Setup Key
        if: always()
        run: |
          if [ -z "${NB_SETUP_KEY_ID:-}" ] || [ "${NB_SETUP_KEY_ID}" = "null" ]; then
            echo "No setup key to revoke"
            exit 0
          fi
          curl -fsSL -X DELETE \
            -H "Authorization: Token $NETBIRD_SA_TOKEN" \
            "https://api.netbird.io/api/setup-keys/${NB_SETUP_KEY_ID}"
          echo "Setup key revoked"
