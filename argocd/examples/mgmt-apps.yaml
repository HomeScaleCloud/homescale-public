apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HomeScaleCloud/homescale.git
    targetRevision: main
    path: argocd/apps
    helm:
      releaseName: mgmt-apps
      valueFiles:
        - ../../clusters/mgmt/apps.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
